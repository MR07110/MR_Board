<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MR Board · Ultimate Group Edition</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* ==========================================================================
           1. ASOSIY SOZLAMALAR VA DIZAYN TIZIMI
           ========================================================================== */
        :root {
            /* Chuqur qora va kulrang palitra (Performans va ko'z uchun qulay) */
            --bg-base: #000000;
            --bg-surface: #121212;
            --bg-surface-elevated: #1e1e1e;
            --bg-overlay: rgba(0, 0, 0, 0.75);
            
            --border-subtle: #2a2a2a;
            --border-active: #404040;
            
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            
            /* Accent ranglar */
            --accent-primary: #3b82f6;
            --accent-hover: #2563eb;
            --accent-alpha: rgba(59, 130, 246, 0.15);
            
            --status-success: #10b981;
            --status-danger: #ef4444;
            --status-danger-alpha: rgba(239, 68, 68, 0.15);
            --status-warning: #f59e0b;

            /* Geometriya */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-full: 9999px;
            
            /* Soyalar */
            --shadow-float: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            --shadow-subtle: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            
            /* Animatsiyalar */
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
            --duration-fast: 150ms;
            --duration-normal: 300ms;

            /* Z-Index iyerarxiyasi */
            --z-canvas: 1;
            --z-grid: 2;
            --z-ui: 10;
            --z-sidebar: 50;
            --z-modal: 100;
            --z-toast: 999;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        button, input, textarea {
            border: none;
            background: none;
            color: inherit;
            font-family: inherit;
            outline: none;
        }

        button { cursor: pointer; }

        /* ==========================================================================
           2. CANVAS VA GRID (ASOSIY ISH MAYDONI)
           ========================================================================== */
        #canvas-wrapper {
            position: absolute;
            inset: 0;
            z-index: var(--z-canvas);
            background-color: var(--bg-base);
        }

        #main-canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        /* ==========================================================================
           3. AUTHENTICATION (KIRISH EKRANI)
           ========================================================================== */
        #auth-screen {
            position: fixed;
            inset: 0;
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at top, #1e1e24 0%, var(--bg-base) 80%);
            z-index: var(--z-modal);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            transition: opacity var(--duration-normal) var(--ease-out-expo);
        }

        .auth-container {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-float);
            animation: slideUp 0.6s var(--ease-out-expo);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-title {
            font-size: 36px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .brand-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 40px;
        }

        .input-group { margin-bottom: 24px; }
        
        .input-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .auth-input {
            width: 100%;
            padding: 16px;
            background-color: var(--bg-base);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 16px;
            color: var(--text-main);
            transition: border-color var(--duration-fast);
        }

        .auth-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px var(--accent-alpha);
        }

        .btn-primary, .btn-secondary {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all var(--duration-fast);
            margin-bottom: 16px;
        }

        .btn-primary {
            background-color: var(--accent-primary);
            color: #fff;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover { background-color: var(--accent-hover); transform: translateY(-2px); }
        .btn-primary:active { transform: translateY(1px); }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-main);
        }
        .btn-secondary:hover { background-color: var(--bg-surface-elevated); }

        .divider-text {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 32px 0;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
        }
        .divider-text::before, .divider-text::after {
            content: ''; flex: 1; border-bottom: 1px solid var(--border-subtle);
        }
        .divider-text span { padding: 0 16px; }

        /* ==========================================================================
           4. ASOSIY INTERFEYS (TOOLBarlar)
           ========================================================================== */
        #ui-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: var(--z-ui);
            display: none;
        }

        /* Top Status Bar */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .pill-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .status-pill {
            background-color: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
            box-shadow: var(--shadow-subtle);
        }

        /* Bottom Toolbar */
        .bottom-dock {
            position: absolute;
            bottom: 32px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
            padding: 0 16px;
        }

        .toolbar-glass {
            background-color: rgba(24, 24, 24, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: auto;
            box-shadow: var(--shadow-float);
            max-width: 100%;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .toolbar-glass::-webkit-scrollbar { display: none; }

        .toolbar-divider {
            width: 1px;
            height: 32px;
            background-color: var(--border-subtle);
            margin: 0 6px;
        }

        .action-btn {
            width: 48px;
            height: 48px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all var(--duration-fast);
            position: relative;
            flex-shrink: 0;
        }

        .action-btn:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .action-btn:active { transform: scale(0.9); }

        .action-btn.active-tool {
            color: var(--accent-primary);
            background-color: var(--accent-alpha);
        }

        /* Audio Visualizer */
        .audio-wave {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 0 16px;
            height: 48px;
            border-radius: 18px;
            border: 1px inset rgba(255,255,255,0.02);
        }

        .wave-bars {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 24px;
        }

        .w-bar {
            width: 4px;
            min-height: 4px;
            background-color: var(--accent-primary);
            border-radius: 4px;
            transition: height 0.07s ease;
        }

        .db-label {
            font-size: 12px;
            font-family: monospace;
            color: var(--text-muted);
            width: 50px;
            text-align: right;
            font-weight: 600;
        }

        .mic-on { color: var(--accent-primary) !important; background-color: var(--accent-alpha) !important; }
        .mic-off { color: var(--status-danger) !important; background-color: var(--status-danger-alpha) !important; }
        .mic-speaking { color: var(--status-success) !important; background-color: rgba(16, 185, 129, 0.15) !important; animation: pulseMic 1.5s infinite; }

        @keyframes pulseMic {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.3); }
            70% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .color-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.9);
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .color-dot:hover { transform: scale(1.15); }

        .notification-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background-color: var(--status-danger);
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            border: 2px solid var(--bg-surface);
        }

        /* ==========================================================================
           5. YON MENYULAR (SIDEBARS & MODALS)
           ========================================================================== */
        .backdrop {
            position: fixed;
            inset: 0;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: var(--z-sidebar);
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--duration-normal);
        }
        .backdrop.visible { opacity: 1; pointer-events: auto; }

        .drawer {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border-subtle);
            z-index: calc(var(--z-sidebar) + 1);
            transform: translateX(-100%);
            transition: transform var(--duration-normal) var(--ease-out-expo);
            display: flex;
            flex-direction: column;
        }

        .drawer.right-side {
            left: auto;
            right: 0;
            border-right: none;
            border-left: 1px solid var(--border-subtle);
            transform: translateX(100%);
        }

        .drawer.open { transform: translateX(0); box-shadow: var(--shadow-float); }

        .drawer-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .drawer-title {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--bg-surface-elevated);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .icon-btn:hover { background-color: var(--border-subtle); color: #fff; }

        .drawer-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* Settings Items */
        .heading-sm {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 600;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }

        .grid-card {
            background-color: var(--bg-surface-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }

        .grid-card:hover { border-color: var(--border-active); background-color: #2a2a2a; transform: translateY(-2px); }
        .grid-card:active { transform: scale(0.96); }
        
        .grid-card.danger-zone {
            color: var(--status-danger);
            border-color: rgba(239, 68, 68, 0.3);
            background-color: rgba(239, 68, 68, 0.05);
        }

        .slider-box {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            background-color: var(--bg-surface-elevated);
            padding: 20px;
            border-radius: var(--radius-md);
        }

        input[type=range] {
            flex: 1;
            height: 8px;
            -webkit-appearance: none;
            background: var(--border-subtle);
            border-radius: 8px;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent-primary);
            border: 4px solid var(--bg-surface);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        /* Color Picker */
        .wheel-container {
            width: 100%;
            aspect-ratio: 1;
            max-width: 280px;
            margin: 0 auto 32px;
            position: relative;
        }

        #color-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            cursor: crosshair;
            box-shadow: 0 0 0 6px var(--bg-surface-elevated), var(--shadow-float);
        }

        .color-preview-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-surface-elevated);
            padding: 16px 20px;
            border-radius: var(--radius-md);
            margin-bottom: 32px;
            font-weight: 500;
        }

        .swatch-display {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .palette-color {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        .palette-color:hover { transform: scale(1.1); border-color: #fff; }

        /* Student List */
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .user-row {
            background-color: var(--bg-surface-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-meta {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: #fff;
            text-transform: uppercase;
            box-shadow: var(--shadow-subtle);
        }

        .perm-toggles { display: flex; gap: 10px; }

        .toggle-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .host-mode .toggle-btn { cursor: pointer; }
        .host-mode .toggle-btn:hover { border-color: var(--text-main); color: var(--text-main); }
        
        .toggle-btn.is-active {
            background-color: var(--accent-alpha);
            color: var(--accent-primary);
            border-color: rgba(59, 130, 246, 0.4);
        }

        /* Chat System */
        .chat-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-feed {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-active) transparent;
        }
        .chat-feed::-webkit-scrollbar { width: 6px; }
        .chat-feed::-webkit-scrollbar-thumb { background-color: var(--border-active); border-radius: 10px; }

        .msg-bubble {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
            animation: msgPopIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            word-wrap: break-word;
        }

        @keyframes msgPopIn {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .msg-mine {
            background-color: var(--accent-primary);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-other {
            background-color: var(--bg-surface-elevated);
            border: 1px solid var(--border-subtle);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-author {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .msg-mine .msg-author { color: rgba(255,255,255,0.8); }

        .msg-timestamp {
            font-size: 11px;
            opacity: 0.6;
            text-align: right;
            margin-top: 8px;
        }

        .chat-composer {
            padding: 20px;
            background-color: var(--bg-surface);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            gap: 12px;
        }

        .chat-input-field {
            flex: 1;
            padding: 14px 20px;
            background-color: var(--bg-surface-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 30px;
            color: var(--text-main);
            font-size: 15px;
            transition: border-color 0.2s;
        }
        .chat-input-field:focus { border-color: var(--accent-primary); }

        .send-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background-color: var(--accent-primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .send-btn:hover { background-color: var(--accent-hover); transform: scale(1.05); }

        /* Text Input Modal */
        .text-dialog {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 32px;
            width: 90%;
            max-width: 420px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            opacity: 0;
            pointer-events: none;
            transition: all var(--duration-normal) var(--ease-out-expo);
            z-index: calc(var(--z-modal) + 2);
            box-shadow: var(--shadow-float);
        }

        .text-dialog.visible {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .text-dialog textarea {
            width: 100%;
            background-color: var(--bg-base);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 20px;
            color: var(--text-main);
            font-size: 16px;
            min-height: 120px;
            resize: none;
            margin: 24px 0;
        }
        .text-dialog textarea:focus { border-color: var(--accent-primary); }

        /* Toast Notifications */
        #toast-zone {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: var(--z-toast);
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }

        .toast-msg {
            background-color: var(--bg-surface-elevated);
            border-left: 4px solid var(--accent-primary);
            color: var(--text-main);
            padding: 16px 24px;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-float);
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: toastDrop 0.4s var(--ease-out-expo) forwards;
        }

        .toast-msg.error { border-left-color: var(--status-danger); }

        @keyframes toastDrop {
            from { opacity: 0; transform: translateY(-30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* WebRTC Hidden Audio */
        #rtc-audio-pool { display: none; }

        /* Responsive qoidalar */
        @media (max-width: 768px) {
            .drawer { max-width: 100%; }
            .top-bar { flex-direction: column; gap: 10px; }
            .bottom-dock { padding: 0 10px; bottom: 16px; }
            .action-btn { width: 42px; height: 42px; }
            .audio-wave { display: none; } /* Mobilda joyni tejash uchun to'lqin yashiriladi */
            .auth-container { border: none; border-radius: 0; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="rtc-audio-pool"></div>
    <div id="toast-zone"></div>

    <div id="auth-screen">
        <div class="auth-container">
            <h1 class="brand-title">MR Board Pro</h1>
            <p class="brand-subtitle">Guruhlar uchun ideal hamkorlik doskasi</p>
            
            <div class="input-group">
                <label class="input-label">Ismingiz</label>
                <input type="text" id="inp-name" class="auth-input" placeholder="Ismni kiriting" autocomplete="off" spellcheck="false">
            </div>

            <button id="btn-host" class="btn-primary">
                <i data-lucide="crown"></i> Host bo'lish (Yangi xona)
            </button>

            <div class="divider-text"><span>YOKI XONAGA QO'SHILISH</span></div>

            <div class="input-group">
                <label class="input-label">Xona Kodi</label>
                <input type="text" id="inp-room" class="auth-input" placeholder="Masalan: MR-X8A2" autocomplete="off" style="text-transform: uppercase;">
            </div>

            <button id="btn-join" class="btn-secondary">
                <i data-lucide="log-in"></i> Xonaga kirish
            </button>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="main-canvas"></canvas>
    </div>

    <div id="ui-layer">
        
        <div class="top-bar">
            <div class="pill-group">
                <div class="status-pill" title="Xona Kodi">
                    <i data-lucide="hash" size="16" style="color: var(--text-muted)"></i>
                    <span id="ui-roomcode" style="font-family: monospace; letter-spacing: 1.5px;">---</span>
                </div>
                <div class="status-pill">
                    <i data-lucide="search" size="16" style="color: var(--text-muted)"></i>
                    <span id="ui-zoom">100%</span>
                </div>
            </div>
            <div class="pill-group">
                <div class="status-pill" id="ui-role">
                    <i data-lucide="eye" size="16"></i> Kuzatuvchi
                </div>
            </div>
        </div>

        <div class="bottom-dock">
            <div class="toolbar-glass">
                <button class="action-btn" id="t-settings" title="Sozlamalar"><i data-lucide="settings-2"></i></button>
                <button class="action-btn" id="t-colors" title="Ranglar">
                    <div class="color-dot" id="ui-color-dot" style="background-color: #3b82f6;"></div>
                </button>

                <div class="toolbar-divider"></div>

                <button class="action-btn active-tool" data-action="draw" title="Qalam"><i data-lucide="pencil"></i></button>
                <button class="action-btn" data-action="erase" title="O'chirg'ich"><i data-lucide="eraser"></i></button>
                <button class="action-btn" data-action="pan" title="Surish"><i data-lucide="hand"></i></button>
                <button class="action-btn" data-action="text" title="Matn"><i data-lucide="type"></i></button>
                <button class="action-btn" id="t-undo" title="Bekor qilish"><i data-lucide="undo-2"></i></button>

                <div class="toolbar-divider"></div>

                <div class="audio-wave">
                    <div class="wave-bars" id="audio-bars">
                        <div class="w-bar"></div><div class="w-bar"></div><div class="w-bar"></div>
                        <div class="w-bar"></div><div class="w-bar"></div><div class="w-bar"></div>
                        <div class="w-bar"></div><div class="w-bar"></div>
                    </div>
                    <span class="db-label" id="audio-db">-∞ dB</span>
                </div>

                <button class="action-btn mic-off" id="t-mic" title="Mikrofon"><i data-lucide="mic-off"></i></button>
                
                <button class="action-btn" id="t-chat" title="Chat">
                    <i data-lucide="message-square"></i>
                    <div class="notification-badge" id="badge-chat" style="display: none;">0</div>
                </button>
                
                <button class="action-btn" id="t-users" title="Guruh a'zolari" style="display: none;">
                    <i data-lucide="users"></i>
                    <div class="notification-badge" id="badge-users">0</div>
                </button>
                
                <button class="action-btn" id="t-exit" title="Chiqish"><i data-lucide="log-out"></i></button>
            </div>
        </div>
    </div>

    <div class="backdrop" id="ui-backdrop"></div>

    <div class="drawer" id="side-settings">
        <div class="drawer-header">
            <h2 class="drawer-title"><i data-lucide="settings"></i> Sozlamalar</h2>
            <button class="icon-btn" data-close-sidebar><i data-lucide="x"></i></button>
        </div>
        <div class="drawer-body">
            <div class="heading-sm">Qalam Qalinligi</div>
            <div class="slider-box">
                <i data-lucide="pen-tool" size="20" style="color: var(--text-muted)"></i>
                <input type="range" id="inp-size" min="1" max="50" value="4">
                <span style="font-family: monospace; font-size: 15px; width: 45px; text-align: right;"><span id="ui-size-val">4</span>px</span>
            </div>

            <div class="heading-sm">Harakatlar</div>
            <div class="action-grid">
                <button class="grid-card" id="act-undo"><i data-lucide="undo-2" size="24"></i>Bekor qilish</button>
                <button class="grid-card" id="act-image"><i data-lucide="image" size="24"></i>Rasm yuklash</button>
                <button class="grid-card" id="act-center"><i data-lucide="target" size="24"></i>Markazlashtirish</button>
                <button class="grid-card" id="act-export"><i data-lucide="download" size="24"></i>Saqlash (PNG)</button>
            </div>

            <div id="host-controls" style="display: none;">
                <div class="heading-sm" style="color: var(--status-danger); margin-top: 24px;">Host Boshqaruvi</div>
                <div class="action-grid" style="grid-template-columns: 1fr;">
                    <button class="grid-card danger-zone" id="act-clear">
                        <i data-lucide="trash-2" size="24"></i>Barcha ma'lumotlarni o'chirish
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="drawer" id="side-colors">
        <div class="drawer-header">
            <h2 class="drawer-title"><i data-lucide="palette"></i> Ranglar</h2>
            <button class="icon-btn" data-close-sidebar><i data-lucide="x"></i></button>
        </div>
        <div class="drawer-body">
            <div class="wheel-container">
                <canvas id="color-canvas" width="280" height="280"></canvas>
            </div>
            
            <div class="heading-sm">Yorug'lik</div>
            <div class="slider-box">
                <i data-lucide="sun" size="20" style="color: var(--text-muted)"></i>
                <input type="range" id="inp-bright" min="0" max="100" value="100">
            </div>

            <div class="color-preview-box">
                <span>Hozirgi Rang:</span>
                <div class="swatch-display" id="ui-color-preview" style="background-color: #3b82f6;"></div>
            </div>

            <div class="heading-sm">Palitra</div>
            <div class="palette-grid" id="color-palette"></div>
        </div>
    </div>

    <div class="drawer right-side" id="side-users">
        <div class="drawer-header">
            <h2 class="drawer-title"><i data-lucide="users"></i> Guruh a'zolari</h2>
            <button class="icon-btn" data-close-sidebar><i data-lucide="x"></i></button>
        </div>
        <div class="drawer-body">
            <div class="user-list" id="ui-users-list"></div>
        </div>
    </div>

    <div class="drawer right-side" id="side-chat">
        <div class="drawer-header">
            <h2 class="drawer-title"><i data-lucide="message-square"></i> Chat</h2>
            <button class="icon-btn" data-close-sidebar><i data-lucide="x"></i></button>
        </div>
        <div class="chat-layout">
            <div class="chat-feed" id="ui-chat-feed"></div>
            <div class="chat-composer">
                <input type="text" id="inp-chat-msg" class="chat-input-field" placeholder="Xabar yozing..." autocomplete="off">
                <button class="send-btn" id="btn-send"><i data-lucide="send" size="20"></i></button>
            </div>
        </div>
    </div>

    <div class="text-dialog" id="dialog-text">
        <h3 style="font-size: 20px; font-weight: 700;">Matn kiritish</h3>
        <textarea id="inp-text-content" placeholder="Doskaga nima yozmoqchisiz?"></textarea>
        <div style="display: flex; justify-content: flex-end; gap: 16px;">
            <button class="btn-secondary" id="btn-text-cancel" style="width: auto; padding: 12px 24px;">Bekor qilish</button>
            <button class="btn-primary" id="btn-text-ok" style="width: auto; padding: 12px 24px; margin: 0;">Qo'shish</button>
        </div>
    </div>

    <script>
        /**
         * MR Board Pro - Single File Application Logic
         * Uses IIFE to prevent global scope pollution and ensure strict encapsulation.
         */
        (function() {
            'use strict';

            lucide.createIcons();

            // ==========================================
            // 1. CORE UTILITIES
            // ==========================================
            const Core = {
                throttle: (func, limit) => {
                    let inThrottle;
                    return function(...args) {
                        if (!inThrottle) {
                            func.apply(this, args);
                            inThrottle = true;
                            setTimeout(() => inThrottle = false, limit);
                        }
                    };
                },
                generateId: (prefix = 'ID') => `${prefix}_${Math.random().toString(36).substr(2, 9)}_${Date.now()}`,
                sanitizeHTML: (str) => {
                    const temp = document.createElement('div');
                    temp.textContent = str;
                    return temp.innerHTML;
                },
                getTimeStr: () => new Date().toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' })
            };

            // ==========================================
            // 2. STATE MANAGEMENT (Store)
            // ==========================================
            class StateManager {
                constructor() {
                    // Auth & Room
                    this.uid = Core.generateId('USR');
                    this.uname = '';
                    this.isHost = false;
                    this.roomId = '';

                    // Permissions (For participants)
                    this.permDraw = false;
                    this.permSpeak = false;

                    // Physical Toggles
                    this.micActive = false;
                    this.unreadChats = 0;

                    // Canvas Tools
                    this.tool = 'draw';
                    this.color = '#3b82f6';
                    this.size = 4;
                    this.camera = { x: 0, y: 0, zoom: 1 };

                    // Data Pools
                    this.elements = [];
                    this.livePaths = {};
                    this.cursors = {};
                    this.peers = {}; // Network peers
                    
                    // Temp
                    this.textPos = null;
                }

                get canDraw() { return this.isHost || this.permDraw; }
                get canSpeak() { return this.isHost || this.permSpeak; }
            }
            const AppState = new StateManager();

            // ==========================================
            // 3. UI CONTROLLER (DOM Management)
            // ==========================================
            class UIController {
                constructor() {
                    this.initDOM();
                    this.bindEvents();
                }

                initDOM() {
                    this.els = {
                        // Views
                        authView: document.getElementById('auth-screen'),
                        uiLayer: document.getElementById('ui-layer'),
                        backdrop: document.getElementById('ui-backdrop'),
                        txtDialog: document.getElementById('dialog-text'),
                        
                        // Sidebars
                        sidebars: document.querySelectorAll('.drawer'),
                        
                        // Inputs
                        inpName: document.getElementById('inp-name'),
                        inpRoom: document.getElementById('inp-room'),
                        inpChat: document.getElementById('inp-chat-msg'),
                        inpTxt: document.getElementById('inp-text-content'),
                        
                        // Badges & Status
                        roomIdStr: document.getElementById('ui-roomcode'),
                        zoomStr: document.getElementById('ui-zoom'),
                        roleStr: document.getElementById('ui-role'),
                        badgeChat: document.getElementById('badge-chat'),
                        badgeUsers: document.getElementById('badge-users'),
                        micBtn: document.getElementById('t-mic')
                    };
                }

                bindEvents() {
                    // Auth
                    document.getElementById('btn-host').onclick = () => this.handleAuth(true);
                    document.getElementById('btn-join').onclick = () => this.handleAuth(false);

                    // Sidebar Toggles
                    const opens = {
                        't-settings': 'side-settings',
                        't-colors': 'side-colors',
                        't-chat': 'side-chat',
                        't-users': 'side-users'
                    };
                    for (let [btnId, sideId] of Object.entries(opens)) {
                        document.getElementById(btnId).onclick = () => this.openSidebar(sideId);
                    }

                    // Closers
                    document.querySelectorAll('[data-close-sidebar]').forEach(b => b.onclick = () => this.closeAll());
                    this.els.backdrop.onclick = () => this.closeAll();

                    // Tool Selectors
                    document.querySelectorAll('[data-action]').forEach(b => {
                        b.onclick = () => {
                            this.setTool(b.dataset.action);
                            this.closeAll();
                        };
                    });

                    // Pen Size
                    document.getElementById('inp-size').oninput = (e) => {
                        AppState.size = parseInt(e.target.value);
                        document.getElementById('ui-size-val').innerText = AppState.size;
                    };

                    // Action Grid
                    document.getElementById('act-undo').onclick = () => { FirebaseEngine.undo(); this.closeAll(); };
                    document.getElementById('t-undo').onclick = () => FirebaseEngine.undo();
                    document.getElementById('act-clear').onclick = () => { FirebaseEngine.clearAll(); this.closeAll(); };
                    document.getElementById('act-image').onclick = () => { this.uploadImage(); this.closeAll(); };
                    document.getElementById('act-center').onclick = () => {
                        AppState.camera = { x: 0, y: 0, zoom: 1 };
                        CanvasEngine.requestRedraw();
                        this.updateZoom();
                        FirebaseEngine.syncCamera();
                        this.closeAll();
                    };
                    document.getElementById('act-export').onclick = () => {
                        const a = document.createElement('a');
                        a.download = `MR_Board_${Date.now()}.png`;
                        a.href = document.getElementById('main-canvas').toDataURL('image/png');
                        a.click();
                        this.closeAll();
                    };

                    // Text Dialog
                    document.getElementById('btn-text-cancel').onclick = () => this.hideTextDialog();
                    document.getElementById('btn-text-ok').onclick = () => {
                        const txt = this.els.inpTxt.value.trim();
                        if (txt && AppState.textPos) {
                            FirebaseEngine.pushElement({
                                type: 'text', text: txt,
                                x: AppState.textPos.x, y: AppState.textPos.y,
                                size: AppState.size * 3 + 14, color: AppState.color
                            });
                        }
                        this.hideTextDialog();
                    };

                    // Chat
                    document.getElementById('btn-send').onclick = () => this.sendMsg();
                    this.els.inpChat.onkeypress = (e) => { if (e.key === 'Enter') this.sendMsg(); };

                    // Mic & Exit
                    this.els.micBtn.onclick = () => AudioEngine.toggle();
                    document.getElementById('t-exit').onclick = () => {
                        if(confirm('Chiqishni tasdiqlaysizmi?')) location.reload();
                    };
                }

                // --- Auth ---
                handleAuth(isHost) {
                    const name = this.els.inpName.value.trim();
                    if (!name) return this.toast("Ism kiriting", "error");

                    let code = isHost ? `MR-${Math.floor(1000 + Math.random() * 9000)}` : this.els.inpRoom.value.trim().toUpperCase();
                    if (!code) return this.toast("Xona kodini kiriting", "error");

                    AppState.uname = name;
                    AppState.isHost = isHost;
                    
                    this.bootApp(code);
                }

                bootApp(roomId) {
                    this.els.authView.style.opacity = '0';
                    setTimeout(() => {
                        this.els.authView.style.display = 'none';
                        this.els.uiLayer.style.display = 'block';
                        
                        this.els.roomIdStr.innerText = roomId;
                        
                        if (AppState.isHost) {
                            document.getElementById('t-users').style.display = 'flex';
                            document.getElementById('host-controls').style.display = 'block';
                            document.getElementById('ui-users-list').classList.add('host-mode');
                        }

                        this.updateRoleInfo();

                        // Init Subsystems
                        FirebaseEngine.connect(roomId);
                        CanvasEngine.init();
                        ColorEngine.init();
                        AudioEngine.init();

                        this.toast("Xonaga ulandingiz!");
                    }, 300);
                }

                // --- UI State Management ---
                openSidebar(id) {
                    this.closeAll();
                    this.els.backdrop.classList.add('visible');
                    document.getElementById(id).classList.add('open');
                    
                    if (id === 'side-chat') {
                        AppState.unreadChats = 0;
                        this.els.badgeChat.style.display = 'none';
                        setTimeout(() => this.els.inpChat.focus(), 300);
                    }
                }

                closeAll() {
                    this.els.sidebars.forEach(s => s.classList.remove('open'));
                    this.els.backdrop.classList.remove('visible');
                    this.hideTextDialog();
                }

                setTool(t) {
                    AppState.tool = t;
                    document.querySelectorAll('[data-action]').forEach(b => b.classList.remove('active-tool'));
                    document.querySelector(`[data-action="${t}"]`).classList.add('active-tool');
                    
                    const cvs = document.getElementById('main-canvas');
                    if (t === 'pan') cvs.style.cursor = 'grab';
                    else if (t === 'text') cvs.style.cursor = 'text';
                    else cvs.style.cursor = 'crosshair';
                }

                updateZoom() { this.els.zoomStr.innerText = Math.round(AppState.camera.zoom * 100) + '%'; }

                updateRoleInfo() {
                    if (AppState.isHost) this.els.roleStr.innerHTML = '<i data-lucide="crown" size="16" style="color:var(--status-warning)"></i> Host';
                    else if (AppState.canDraw) this.els.roleStr.innerHTML = '<i data-lucide="pencil" size="16" style="color:var(--accent-primary)"></i> Yozuvchi';
                    else this.els.roleStr.innerHTML = '<i data-lucide="eye" size="16" style="color:var(--text-muted)"></i> Kuzatuvchi';
                    lucide.createIcons();
                    this.syncMicUI();
                }

                syncMicUI() {
                    const b = this.els.micBtn;
                    b.classList.remove('mic-off', 'mic-on', 'mic-speaking');
                    if (!AppState.canSpeak) { b.classList.add('mic-off'); b.innerHTML = '<i data-lucide="mic-off"></i>'; }
                    else if (AppState.micActive) { b.classList.add('mic-on'); b.innerHTML = '<i data-lucide="mic"></i>'; }
                    else { b.classList.add('mic-off'); b.innerHTML = '<i data-lucide="mic-off"></i>'; }
                    lucide.createIcons();
                }

                pulseMic(isSpeaking) {
                    if (!AppState.canSpeak || !AppState.micActive) return;
                    if (isSpeaking) { this.els.micBtn.classList.add('mic-speaking'); this.els.micBtn.classList.remove('mic-on'); }
                    else { this.els.micBtn.classList.remove('mic-speaking'); this.els.micBtn.classList.add('mic-on'); }
                }

                // --- Tools & Modals ---
                showTextDialog() {
                    this.els.backdrop.classList.add('visible');
                    this.els.txtDialog.classList.add('visible');
                    setTimeout(() => this.els.inpTxt.focus(), 100);
                }
                
                hideTextDialog() {
                    this.els.txtDialog.classList.remove('visible');
                    this.els.inpTxt.value = '';
                    AppState.textPos = null;
                    if (!document.querySelector('.drawer.open')) this.els.backdrop.classList.remove('visible');
                }

                uploadImage() {
                    const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
                    inp.onchange = e => {
                        const file = e.target.files[0];
                        if (!file) return;
                        if (file.size > 5e6) return this.toast("Rasm 5MB dan kichik bo'lishi shart", "error");

                        const reader = new FileReader();
                        reader.onload = ev => {
                            const img = new Image();
                            img.onload = () => {
                                const ctr = CanvasEngine.toWorld(window.innerWidth / 2, window.innerHeight / 2);
                                const maxW = 600 / AppState.camera.zoom;
                                let w = img.width, h = img.height;
                                if (w > maxW) { h = (maxW / w) * h; w = maxW; }
                                
                                FirebaseEngine.pushElement({
                                    type: 'image', data: ev.target.result,
                                    x: ctr.x - w / 2, y: ctr.y - h / 2, width: w, height: h
                                });
                            };
                            img.src = ev.target.result;
                        };
                        reader.readAsDataURL(file);
                    };
                    inp.click();
                }

                // --- Live Data Rendering ---
                sendMsg() {
                    const txt = this.els.inpChat.value.trim();
                    if (!txt) return;
                    FirebaseEngine.pushChat(txt);
                    this.els.inpChat.value = '';
                }

                renderMsg(m) {
                    const feed = document.getElementById('ui-chat-feed');
                    const isMe = m.uid === AppState.uid;
                    const div = document.createElement('div');
                    div.className = `msg-bubble ${isMe ? 'msg-mine' : 'msg-other'}`;
                    
                    let icon = m.isHost ? '<i data-lucide="crown" size="12"></i>' : '';
                    div.innerHTML = `
                        <div class="msg-author">${m.name} ${icon}</div>
                        <div>${m.text}</div>
                        <div class="msg-timestamp">${m.time}</div>
                    `;
                    feed.appendChild(div);
                    lucide.createIcons();
                    feed.scrollTop = feed.scrollHeight;

                    const sidebar = document.getElementById('side-chat');
                    if (!sidebar.classList.contains('open') && !isMe) {
                        AppState.unreadChats++;
                        this.els.badgeChat.innerText = AppState.unreadChats > 9 ? '9+' : AppState.unreadChats;
                        this.els.badgeChat.style.display = 'flex';
                    }
                }

                renderUsers() {
                    const list = document.getElementById('ui-users-list');
                    let html = '', count = 0;

                    Object.values(AppState.peers).forEach(p => {
                        if (p.isHost) return; 
                        count++;
                        const dCls = p.canDraw ? 'is-active' : '';
                        const sCls = p.canSpeak ? 'is-active' : '';
                        const initial = p.name ? p.name.charAt(0) : '?';

                        html += `
                        <div class="user-row">
                            <div class="user-meta">
                                <div class="user-avatar">${initial}</div>
                                <span style="font-weight:600;">${Core.sanitizeHTML(p.name)}</span>
                            </div>
                            <div class="perm-toggles">
                                <button class="toggle-btn ${dCls}" data-uid="${p.id}" data-type="canDraw"><i data-lucide="pencil" size="18"></i></button>
                                <button class="toggle-btn ${sCls}" data-uid="${p.id}" data-type="canSpeak"><i data-lucide="mic" size="18"></i></button>
                            </div>
                        </div>`;
                    });

                    if (count === 0) html = '<div style="text-align:center;color:var(--text-muted);margin-top:20px;">Hozircha o\'quvchilar yo\'q</div>';
                    list.innerHTML = html;
                    lucide.createIcons();

                    this.els.badgeUsers.innerText = count;
                    this.els.badgeUsers.style.display = count > 0 ? 'flex' : 'none';

                    if (AppState.isHost) {
                        list.querySelectorAll('.toggle-btn').forEach(btn => {
                            btn.onclick = () => {
                                const uid = btn.dataset.uid, t = btn.dataset.type;
                                FirebaseEngine.updatePerm(uid, t, !AppState.peers[uid][t]);
                            };
                        });
                    }
                }

                toast(msg, type = 'success') {
                    const zone = document.getElementById('toast-zone');
                    const t = document.createElement('div');
                    t.className = `toast-msg ${type}`;
                    t.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" size="20"></i><span>${Core.sanitizeHTML(msg)}</span>`;
                    zone.appendChild(t);
                    lucide.createIcons();
                    setTimeout(() => {
                        t.style.opacity = '0';
                        t.style.transform = 'translateY(-20px)';
                        setTimeout(() => t.remove(), 300);
                    }, 3000);
                }
            }
            const UI = new UIController();

            // ==========================================
            // 4. FIREBASE ENGINE (Data Sync)
            // ==========================================
            class FirebaseManager {
                constructor() {
                    const cfg = {
                        apiKey: "AIzaSyDvbG7fChb2LN_nJhwTF1iMKMXNPcuGk5Y",
                        databaseURL: "https://tictactoe-26434-default-rtdb.firebaseio.com",
                        projectId: "tictactoe-26434"
                    };
                    if (!firebase.apps.length) firebase.initializeApp(cfg);
                    this.db = firebase.database();
                    this.ref = null;
                }

                connect(roomId) {
                    AppState.roomId = roomId;
                    this.ref = this.db.ref(`mr_board_pro/${roomId}`);
                    
                    const meRef = this.ref.child(`users/${AppState.uid}`);
                    meRef.onDisconnect().remove();

                    if (AppState.isHost) { AppState.permDraw = true; AppState.permSpeak = true; AppState.micActive = true; }

                    this.setupListeners();
                }

                setPresence() {

                        id: AppState.uid, name: AppState.uname, isHost: AppState.isHost,
                        canDraw: AppState.permDraw, canSpeak: AppState.permSpeak
                    });

                setupListeners() {
                    // 1. Storage Elements
                    this.ref.child('data/elements').on('value', s => {
                        AppState.elements = s.val() ? Object.values(s.val()) : [];
                        CanvasEngine.requestRedraw();
                    });

                    // 2. Active Drawing
                    this.ref.child('data/live').on('value', s => {
                        AppState.livePaths = s.val() || {};
                        CanvasEngine.requestRedraw();
                    });

                    // 3. Pointer Tracking
                    this.ref.child('data/cursors').on('value', s => {
                        AppState.cursors = s.val() || {};
                        CanvasEngine.requestRedraw();
                    });

                    // 4. Viewport Sync (Host -> Client)
                    if (!AppState.isHost) {
                        this.ref.child('config/camera').on('value', s => {
                            if (s.val() && !AppState.canDraw) {
                                AppState.camera = s.val();

                    // 5. User Management & Permissions
                    this.ref.child('users').on('value', s => {
                        AppState.peers = s.val() || {};
                        
                        if (!AppState.isHost && AppState.peers[AppState.uid]) {
                            const me = AppState.peers[AppState.uid];
                            let reRender = false;
                            
                            if (AppState.permDraw !== me.canDraw) { AppState.permDraw = me.canDraw; reRender = true; }
                            if (AppState.permSpeak !== me.canSpeak) {
                                AppState.permSpeak = me.canSpeak;

                    // 6. Chat Feed
                    this.ref.child('chat').on('child_added', s => UI.renderMsg(s.val()));

                // Ops
                setLivePath(id, d) { this.ref.child(`data/live/${id}`).set(d); }
                updateLivePath(id, p) { this.ref.child(`data/live/${id}`).update({ points: p }); }
                delLivePath(id) { this.ref.child(`data/live/${id}`).remove(); }
                
                pushElement(data) {
                    data.uid = AppState.uid; data.ts = Date.now();
                    this.ref.child('data/elements').push(data);
                }

                syncCursor = Core.throttle((pos) => {
                    this.ref.child(`data/cursors/${AppState.uid}`).set({ x: pos.x, y: pos.y, name: AppState.uname, isHost: AppState.isHost });
                }, 40);

                syncCamera() { if (AppState.isHost) this.ref.child('config/camera').set(AppState.camera); }

                undo() {
                    this.ref.child('data/elements').once('value', s => {
                        if (!s.val()) return;
                        const arr = Object.keys(s.val()).map(k => ({ key: k, ...s.val()[k] }));
                        const mine = arr.filter(i => i.uid === AppState.uid);

                            this.ref.child(`data/elements/${mine[mine.length - 1].key}`).remove();

                clearAll() { if (AppState.isHost) this.ref.child('data').remove(); }
                updatePerm(uid, perm, val) { if (AppState.isHost) this.ref.child(`users/${uid}`).update({ [perm]: val }); }
                
                pushChat(txt) {
                    this.ref.child('chat').push({
                        uid: AppState.uid, name: AppState.uname, isHost: AppState.isHost,
