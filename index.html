    <input type="file" id="sys-file-img" accept="image/png, image/jpeg, image/webp" style="display: none;">
    <input type="file" id="sys-file-json" accept=".mrboard, .json" style="display: none;">

    <script>
        /**
         * MR BOARD - ENTERPRISE MONOLITH (ULTIMATE EDITION)
         * Fully optimized, production-ready whiteboard with real-time collaboration,
         * WebRTC audio, shape tools, laser pointer, minimap, chat, user permissions,
         * undo/redo, image import, JSON save/load, and adaptive UI.
         * 
         * Architecture: Event-driven, modular within a single closure for performance.
         * Dependencies: Firebase (realtime DB), Lucide (icons), Rough.js (hand-drawn style).
         * 
         * Total lines (with comments) ~3400.
         */
        (function() {
            'use strict';
            lucide.createIcons();

            // --------------------------------------------------------------
            // 1. UTILITIES & HELPERS
            // --------------------------------------------------------------
            class Utils {
                static generateId(prefix = 'ID') {
                    return `${prefix}_${Math.random().toString(36).slice(2, 11)}_${Date.now().toString(36)}`;
                }
                static sanitize(str) {
                    return String(str).replace(/[&<>"'/]/g, m => ({
                        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', "/": '&#x2F;'
                    }[m]));
                }
                static throttle(fn, wait) {
                    let last = 0;
                    return function(...args) {
                        const now = Date.now();
                        if (now - last >= wait) {
                            fn.apply(this, args);
                            last = now;
                        }
                    };
                }
                static vibrate(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); }
                static readFile(file, asText = false) {
                    return new Promise((res, rej) => {
                        const r = new FileReader();
                        r.onload = e => res(e.target.result);
                        r.onerror = rej;
                        asText ? r.readAsText(file) : r.readAsDataURL(file);
                    });
                }
                static getTime() { return new Date().toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' }); }
            }

            // --------------------------------------------------------------
            // 2. EVENT EMITTER (Decoupled Communication)
            // --------------------------------------------------------------
            class EventEmitter {
                constructor() { this.events = {}; }
                on(event, listener) { if (!this.events[event]) this.events[event] = []; this.events[event].push(listener); }
                emit(event, data) { if (this.events[event]) this.events[event].forEach(l => l(data)); }
            }
            const AppEvents = new EventEmitter();

            // --------------------------------------------------------------
            // 3. GLOBAL APPLICATION STATE
            // --------------------------------------------------------------
            const Store = {
                uid: Utils.generateId('USR'),
                name: '',
                isHost: false,
                roomId: '',
                hostKey: '',
                perms: { draw: false, speak: false },
                micActive: false,
                tool: 'draw',
                color: '#2563eb',
                size: 4,
                cam: { x: 0, y: 0, z: 1 },
                db: { els: [], live: {}, laser: {}, curs: {}, peers: {} },
                unread: 0,
                textCtx: null,
                lastChat: 0
            };

            // --------------------------------------------------------------
            // 4. FIREBASE SERVICE (Real-time Data Sync)
            // --------------------------------------------------------------
            class FirebaseService {
                constructor() { this.ref = null; }

                init(roomId) {
                    if (!firebase.apps.length) {
                        firebase.initializeApp({
                            apiKey: "AIzaSyDvbG7fChb2LN_nJhwTF1iMKMXNPcuGk5Y",
                            databaseURL: "https://tictactoe-26434-default-rtdb.firebaseio.com",
                            projectId: "tictactoe-26434"
                        });
                    }
                    this.ref = firebase.database().ref(`mr_enterprise/${roomId}`);
                    
                    const me = this.ref.child(`users/${Store.uid}`);
                    me.onDisconnect().remove();

                    if (Store.isHost) {
                        Store.perms.draw = true;
                        Store.perms.speak = true;
                        Store.micActive = true;
                        this.ref.child('meta/hostKey').set(Store.hostKey);
                    }
                    me.set({ id: Store.uid, n: Store.name, h: Store.isHost, d: Store.perms.draw, s: Store.perms.speak });

                    this.attachListeners();
                }

                attachListeners() {
                    this.ref.child('data/elements').on('value', s => {
                        Store.db.els = s.val() ? Object.values(s.val()) : [];
                        AppEvents.emit('render');
                    });
                    this.ref.child('data/live').on('value', s => {
                        Store.db.live = s.val() || {};
                        AppEvents.emit('render');
                    });
                    this.ref.child('data/laser').on('value', s => {
                        Store.db.laser = s.val() || {};
                        AppEvents.emit('render');
                    });
                    this.ref.child('data/cursors').on('value', s => {
                        Store.db.curs = s.val() || {};
                        AppEvents.emit('render');
                    });
                    
                    if (!Store.isHost) {
                        this.ref.child('cam').on('value', s => {
                            if (s.val() && !Store.perms.draw) {
                                Store.cam = s.val();
                                AppEvents.emit('render');
                                AppEvents.emit('ui:zoom');
                            }
                        });
                    }
                    
                    this.ref.child('users').on('value', s => {
                        Store.db.peers = s.val() || {};
                        if (!Store.isHost && Store.db.peers[Store.uid]) {
                            const p = Store.db.peers[Store.uid];
                            let changed = false;
                            if (Store.perms.draw !== p.d) { Store.perms.draw = p.d; changed = true; }
                            if (Store.perms.speak !== p.s) {
                                Store.perms.speak = p.s;
                                if (!p.s) Store.micActive = false;
                                AppEvents.emit('audio:sync');
                                changed = true;
                            }
                            if (changed) AppEvents.emit('ui:role');
                        }
                        AppEvents.emit('ui:users');
                    });
                    
                    this.ref.child('chat').on('child_added', s => AppEvents.emit('ui:chat', s.val()));
                }

                setLive(id, data, isLaser = false) {
                    const path = isLaser ? 'laser' : 'live';
                    this.ref.child(`data/${path}/${id}`).set(data);
                    if (isLaser) setTimeout(() => this.ref.child(`data/laser/${id}`).remove(), 1200);
                }

                updLive(id, points, isLaser = false) {
                    this.ref.child(`data/${isLaser ? 'laser' : 'live'}/${id}`).update({ p: points });
                }

                rmLive(id) { this.ref.child(`data/live/${id}`).remove(); }

                pushElement(el) {
                    el.u = Store.uid;
                    el.t = Date.now();
                    this.ref.child('data/elements').push(el);
                }

                updateCursor = Utils.throttle((pos) => {
                    this.ref.child(`data/cursors/${Store.uid}`).set({ x: pos.x, y: pos.y, n: Store.name, h: Store.isHost });
                }, 40);

                syncCamera() { if (Store.isHost) this.ref.child('cam').set(Store.cam); }

                undo() {
                    this.ref.child('data/elements').once('value', snap => {
                        if (!snap.val()) return;
                        const elements = Object.keys(snap.val()).map(k => ({ k, ...snap.val()[k] }))
                            .filter(e => e.u === Store.uid);
                        if (elements.length) {
                            const last = elements.sort((a, b) => a.t - b.t)[elements.length - 1];
                            this.ref.child(`data/elements/${last.k}`).remove();
                            Utils.vibrate(15);
                        }
                    });
                }

                clearBoard() {
                    if (Store.isHost) {
                        this.ref.child('meta/hostKey').once('value', snap => {
                            if (snap.val() === Store.hostKey) this.ref.child('data').remove();
                        });
                    }
                }

                setPermission(userId, type, value) {
                    if (Store.isHost) {
                        this.ref.child('meta/hostKey').once('value', snap => {
                            if (snap.val() === Store.hostKey) {
                                this.ref.child(`users/${userId}`).update({ [type]: value });
                            }
                        });
                    }
                }

                sendChat(text) {
                    this.ref.child('chat').push({
                        u: Store.uid,
                        n: Store.name,
                        h: Store.isHost,
                        m: text,
                        tm: Utils.getTime()
                    });
                }
            }

            const DB = new FirebaseService();

            // --------------------------------------------------------------
            // 5. GRAPHICS ENGINE (Canvas Rendering & Input)
            // --------------------------------------------------------------
            class GraphicsEngine {
                constructor() {
                    this.dpr = window.devicePixelRatio || 1;
                    this.cvs = {
                        b: document.getElementById('layer-base'),
                        l: document.getElementById('layer-live'),
                        s: document.getElementById('layer-laser')
                    };
                    this.ctx = {
                        b: this.cvs.b.getContext('2d', { desynchronized: true }),
                        l: this.cvs.l.getContext('2d'),
                        s: this.cvs.s.getContext('2d')
                    };
                    this.miniCvs = document.getElementById('minimap-cvs');
                    this.miniCtx = this.miniCvs.getContext('2d');
                    this.miniView = document.getElementById('minimap-view');
                    
                    this.isDrawing = false;
                    this.lastPos = null;
                    this.activeId = null;
                    this.dirty = true;
                    this.shapeStart = null;
                }

                init() {
                    window.addEventListener('resize', () => this.resize());
                    this.resize();
                    this.bindEvents();
                    AppEvents.on('render', () => this.dirty = true);
                    requestAnimationFrame(() => this.loop());
                }

                resize() {
                    const w = window.innerWidth, h = window.innerHeight;
                    ['b', 'l', 's'].forEach(k => {
                        this.cvs[k].width = w * this.dpr;
                        this.cvs[k].height = h * this.dpr;
                        this.cvs[k].style.width = w + 'px';
                        this.cvs[k].style.height = h + 'px';
                        this.ctx[k].scale(this.dpr, this.dpr);
                    });
                    this.miniCvs.width = 200 * this.dpr;
                    this.miniCvs.height = 140 * this.dpr;
                    this.miniCtx.scale(this.dpr, this.dpr);
                    this.dirty = true;
                }

                toWorld(x, y) {
                    return { x: (x - Store.cam.x) / Store.cam.z, y: (y - Store.cam.y) / Store.cam.z };
                }
                toScreen(x, y) {
                    return { x: x * Store.cam.z + Store.cam.x, y: y * Store.cam.z + Store.cam.y };
                }

                bindEvents() {
                    const wrap = document.getElementById('app-container');
                    
                    // Mouse / touch wheel
                    wrap.addEventListener('wheel', e => {
                        e.preventDefault();
                        if (e.ctrlKey || e.metaKey) {
                            const w = this.toWorld(e.clientX, e.clientY);
                            const nz = Math.min(Math.max(0.1, Store.cam.z * (e.deltaY > 0 ? 0.9 : 1.1)), 5);
                            Store.cam.z = nz;
                            Store.cam.x = e.clientX - w.x * nz;
                            Store.cam.y = e.clientY - w.y * nz;
                            AppEvents.emit('ui:zoom');
                        } else {
                            Store.cam.x -= e.deltaX;
                            Store.cam.y -= e.deltaY;
                        }
                        this.dirty = true;
                        DB.syncCamera();
                    }, { passive: false });

                    // Pointer start
                    wrap.addEventListener('pointerdown', e => {
                        if (!e.isPrimary) return;
                        const w = this.toWorld(e.clientX, e.clientY);
                        
                        if (Store.tool === 'text') {
                            if (Store.perms.draw) {
                                AppEvents.emit('ui:modalText', w);
                            } else {
                                AppEvents.emit('ui:toast', { m: "Chizish ruxsati yo'q", t: 'error' });
                            }
                            return;
                        }
                        
                        this.isDrawing = true;
                        this.lastPos = { x: e.clientX, y: e.clientY };
                        
                        if (!Store.perms.draw && Store.tool !== 'pan') {
                            this.isDrawing = false;
                            return;
                        }

                        this.activeId = Utils.generateId('P');
                        const isLaser = Store.tool === 'laser';
                        
                        if (['draw', 'erase', 'laser'].includes(Store.tool)) {
                            const data = {
                                u: Store.uid,
                                p: [w],
                                c: Store.tool === 'erase' ? '#ffffff' : (isLaser ? '#ef4444' : Store.color),
                                s: (Store.tool === 'erase' ? 60 : Store.size) / Store.cam.z,
                                tl: Store.tool
                            };
                            DB.setLive(this.activeId, data, isLaser);
                        } else if (['rect', 'circle', 'line', 'arrow'].includes(Store.tool)) {
                            this.shapeStart = w;
                            DB.setLive(this.activeId, {
                                u: Store.uid,
                                tl: Store.tool,
                                p1: w,
                                p2: w,
                                c: Store.color,
                                s: Store.size / Store.cam.z
                            });
                        }
                    });

                    // Pointer move
                    window.addEventListener('pointermove', e => {
                        if (!e.isPrimary) return;
                        const w = this.toWorld(e.clientX, e.clientY);
                        DB.updateCursor(w);
                        if (!this.isDrawing) return;

                        if (Store.tool === 'pan') {
                            Store.cam.x += e.clientX - this.lastPos.x;
                            Store.cam.y += e.clientY - this.lastPos.y;
                            this.lastPos = { x: e.clientX, y: e.clientY };
                            this.dirty = true;
                            return;
                        }

                        if (Store.perms.draw && this.activeId) {
                            const isLaser = Store.tool === 'laser';
                            const active = isLaser ? Store.db.laser[this.activeId] : Store.db.live[this.activeId];
                            
                            if (['draw', 'erase', 'laser'].includes(Store.tool) && active && active.p) {
                                // Performance: chunk long paths
                                if (active.p.length > 250 && !isLaser) {
                                    DB.pushElement({ type: 'path', p: active.p, c: active.c, s: active.s });
                                    DB.rmLive(this.activeId);
                                    this.activeId = Utils.generateId('P');
                                    DB.setLive(this.activeId, { u: Store.uid, p: [w], c: active.c, s: active.s, tl: Store.tool });
                                }
                                const last = active.p[active.p.length - 1];
                                if (Math.hypot(w.x - last.x, w.y - last.y) > 2 / Store.cam.z) {
                                    active.p.push(w);
                                    DB.updLive(this.activeId, active.p, isLaser);
                                }
                            } else if (['rect', 'circle', 'line', 'arrow'].includes(Store.tool) && this.shapeStart) {
                                DB.updLive(this.activeId, null);
                                DB.setLive(this.activeId, {
                                    u: Store.uid,
                                    tl: Store.tool,
                                    p1: this.shapeStart,
                                    p2: w,
                                    c: Store.color,
                                    s: Store.size / Store.cam.z
                                });
                            }
                        }
                        this.lastPos = { x: e.clientX, y: e.clientY };
                    });

                    // Pointer end
                    window.addEventListener('pointerup', e => {
                        if (!e.isPrimary || !this.isDrawing) return;
                        this.isDrawing = false;
                        if (Store.perms.draw && this.activeId) {
                            if (['draw', 'erase'].includes(Store.tool)) {
                                const path = Store.db.live[this.activeId];
                                if (path && path.p && path.p.length > 1) {
                                    DB.pushElement({ type: 'path', p: path.p, c: path.c, s: path.s });
                                }
                                DB.rmLive(this.activeId);
                            } else if (['rect', 'circle', 'line', 'arrow'].includes(Store.tool)) {
                                const shape = Store.db.live[this.activeId];
                                if (shape && shape.p1 && shape.p2 && Math.hypot(shape.p1.x - shape.p2.x, shape.p1.y - shape.p2.y) > 5) {
                                    DB.pushElement({ type: 'shape', tl: shape.tl, p1: shape.p1, p2: shape.p2, c: shape.c, s: shape.s });
                                }
                                DB.rmLive(this.activeId);
                                this.shapeStart = null;
                            }
                            this.activeId = null;
                        }
                    });

                    // Pinch zoom for touch
                    let pinchDist = null, pinchZoom = 1;
                    wrap.addEventListener('touchstart', e => {
                        if (e.touches.length === 2) {
                            e.preventDefault();
                            this.isDrawing = false;
                            pinchDist = Math.hypot(
                                e.touches[0].clientX - e.touches[1].clientX,
                                e.touches[0].clientY - e.touches[1].clientY
                            );
                            pinchZoom = Store.cam.z;
                        }
                    }, { passive: false });
                    wrap.addEventListener('touchmove', e => {
                        if (e.touches.length === 2 && pinchDist) {
                            e.preventDefault();
                            const newDist = Math.hypot(
                                e.touches[0].clientX - e.touches[1].clientX,
                                e.touches[0].clientY - e.touches[1].clientY
                            );
                            const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                            const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                            const w = this.toWorld(cx, cy);
                            const nz = Math.min(Math.max(0.1, pinchZoom * (newDist / pinchDist)), 5);
                            Store.cam.z = nz;
                            Store.cam.x = cx - w.x * nz;
                            Store.cam.y = cy - w.y * nz;
                            this.dirty = true;
                            AppEvents.emit('ui:zoom');
                            DB.syncCamera();
                        }
                    }, { passive: false });
                    wrap.addEventListener('touchend', () => { pinchDist = null; });
                }

                // Drawing primitives
                drawSpline(ctx, points, color, width, glow = false) {
                    if (!points || points.length < 2) return;
                    ctx.beginPath();
                    ctx.strokeStyle = color;
                    ctx.lineWidth = width;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    if (glow) { ctx.shadowBlur = 20; ctx.shadowColor = color; }
                    ctx.moveTo(points[0].x, points[0].y);
                    for (let i = 1; i < points.length - 1; i++) {
                        const xc = (points[i].x + points[i + 1].x) / 2;
                        const yc = (points[i].y + points[i + 1].y) / 2;
                        ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
                    }
                    ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
                    ctx.stroke();
                    if (glow) ctx.shadowBlur = 0;
                }

                drawShape(ctx, e) {
                    ctx.beginPath();
                    ctx.strokeStyle = e.c;
                    ctx.lineWidth = e.s;
                    const { p1, p2, tl } = e;
                    if (tl === 'rect') ctx.rect(p1.x, p1.y, p2.x - p1.x, p2.y - p1.y);
                    else if (tl === 'circle') ctx.arc(p1.x, p1.y, Math.hypot(p2.x - p1.x, p2.y - p1.y), 0, Math.PI * 2);
                    else if (tl === 'line') { ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); }
                    else if (tl === 'arrow') {
                        const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                        const h = 25 / Store.cam.z;
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.lineTo(p2.x - h * Math.cos(angle - Math.PI / 6), p2.y - h * Math.sin(angle - Math.PI / 6));
                        ctx.moveTo(p2.x, p2.y);
                        ctx.lineTo(p2.x - h * Math.cos(angle + Math.PI / 6), p2.y - h * Math.sin(angle + Math.PI / 6));
                    }
                    ctx.stroke();
                }

                // Main render loop
                loop() {
                    if (this.dirty) {
                        const { b, l, s } = this.ctx;
                        const w = window.innerWidth, h = window.innerHeight;
                        b.clearRect(0, 0, w, h);
                        l.clearRect(0, 0, w, h);
                        s.clearRect(0, 0, w, h);
                        this.miniCtx.clearRect(0, 0, 200, 140);
                        
                        let bounds = { xMin: Infinity, yMin: Infinity, xMax: -Infinity, yMax: -Infinity };
                        
                        // Base layer (permanent)
                        b.save();
                        b.translate(Store.cam.x, Store.cam.y);
                        b.scale(Store.cam.z, Store.cam.z);
                        Store.db.els.forEach(el => {
                            if (el.type === 'path') this.drawSpline(b, el.p, el.c, el.s);
                            else if (el.type === 'shape') this.drawShape(b, el);
                            else if (el.type === 'text') {
                                b.font = `800 ${el.s}px -apple-system, sans-serif`;
                                b.fillStyle = el.c;
                                b.fillText(el.text, el.x, el.y);
                            } else if (el.type === 'image' && el.data) {
                                if (!el._img) { el._img = new Image(); el._img.src = el.data; el._img.onload = () => this.dirty = true; }
                                if (el._img.complete) b.drawImage(el._img, el.x, el.y, el.width, el.height);
                            }
                            // Update bounds for minimap
                            if (el.x) {
                                bounds.xMin = Math.min(bounds.xMin, el.x);
                                bounds.xMax = Math.max(bounds.xMax, el.x + (el.width || 100));
                                bounds.yMin = Math.min(bounds.yMin, el.y);
                                bounds.yMax = Math.max(bounds.yMax, el.y + (el.height || 100));
                            } else if (el.p && el.p[0]) {
                                bounds.xMin = Math.min(bounds.xMin, el.p[0].x);
                                bounds.xMax = Math.max(bounds.xMax, el.p[0].x);
                                bounds.yMin = Math.min(bounds.yMin, el.p[0].y);
                                bounds.yMax = Math.max(bounds.yMax, el.p[0].y);
                            }
                        });
                        b.restore();

                        // Live layer
                        l.save();
                        l.translate(Store.cam.x, Store.cam.y);
                        l.scale(Store.cam.z, Store.cam.z);
                        Object.values(Store.db.live).forEach(e => {
                            if (e && e.p) this.drawSpline(l, e.p, e.c, e.s);
                            else if (e && e.p1) this.drawShape(l, e);
                        });
                        l.restore();

                        // Laser layer (glowing)
                        s.save();
                        s.translate(Store.cam.x, Store.cam.y);
                        s.scale(Store.cam.z, Store.cam.z);
                        Object.values(Store.db.laser).forEach(e => {
                            if (e && e.p) this.drawSpline(s, e.p, e.c, e.s, true);
                        });
                        s.restore();

                        // Cursors
                        l.save();
                        Object.values(Store.db.curs).forEach(c => {
                            if (c.n === Store.name || typeof c.x !== 'number') return;
                            const pos = this.toScreen(c.x, c.y);
                            l.beginPath();
                            l.arc(pos.x, pos.y, 6, 0, Math.PI * 2);
                            l.fillStyle = c.h ? '#f59e0b' : '#ef4444';
                            l.fill();
                            l.lineWidth = 2;
                            l.strokeStyle = '#fff';
                            l.stroke();
                            l.font = '800 12px -apple-system, sans-serif';
                            l.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-main');
                            l.fillText(c.n, pos.x + 12, pos.y + 4);
                        });
                        l.restore();

                        // Minimap
                        if (bounds.xMin === Infinity) {
                            bounds = { xMin: -500, yMin: -500, xMax: 500, yMax: 500 };
                        } else {
                            bounds.xMin -= 500; bounds.yMin -= 500;
                            bounds.xMax += 500; bounds.yMax += 500;
                        }
                        const mmScale = Math.min(200 / (bounds.xMax - bounds.xMin), 140 / (bounds.yMax - bounds.yMin));
                        this.miniCtx.save();
                        this.miniCtx.translate(100 - (bounds.xMin + (bounds.xMax - bounds.xMin) / 2) * mmScale, 70 - (bounds.yMin + (bounds.yMax - bounds.yMin) / 2) * mmScale);
                        this.miniCtx.scale(mmScale, mmScale);
                        Store.db.els.forEach(el => {
                            if (el.type === 'path') this.drawSpline(this.miniCtx, el.p, el.c, el.s * 3);
                            else if (el.type === 'shape') this.drawShape(this.miniCtx, el);
                        });
                        this.miniCtx.restore();

                        const viewW = window.innerWidth / Store.cam.z;
                        const viewH = window.innerHeight / Store.cam.z;
                        this.miniView.style.width = `${viewW * mmScale}px`;
                        this.miniView.style.height = `${viewH * mmScale}px`;
                        this.miniView.style.transform = `translate(${100 - (bounds.xMin + (bounds.xMax - bounds.xMin) / 2) * mmScale + (-Store.cam.x / Store.cam.z) * mmScale}px, ${70 - (bounds.yMin + (bounds.yMax - bounds.yMin) / 2) * mmScale + (-Store.cam.y / Store.cam.z) * mmScale}px)`;

                        this.dirty = false;
                    }
                    requestAnimationFrame(() => this.loop());
                }
            }

            const Engine = new GraphicsEngine();

            // --------------------------------------------------------------
            // 6. AUDIO MESH (WebRTC)
            // --------------------------------------------------------------
            class AudioMesh {
                constructor() {
                    this.stream = null;
                    this.pcs = {};
                    this.config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
                    this.isSpeaking = false;
                }

                async init() {
                    try {
                        this.stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
                        this.sync();
                        this.visualizer();
                        this.listen();
                    } catch (e) {
                        AppEvents.emit('ui:toast', { m: "Mikrofon xatosi", t: 'error' });
                    }
                }

                toggle() {
                    if (!Store.perms.speak) {
                        AppEvents.emit('ui:toast', { m: "Ruxsat yo'q", t: 'error' });
                        return;
                    }
                    Store.micActive = !Store.micActive;
                    this.sync();
                    AppEvents.emit('ui:mic');
                    Utils.vibrate(10);
                }

                sync() {
                    if (this.stream) {
                        const track = this.stream.getAudioTracks()[0];
                        if (track) track.enabled = Store.perms.speak && Store.micActive;
                    }
                }

                visualizer() {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const analyser = ctx.createAnalyser();
                    ctx.createMediaStreamSource(this.stream).connect(analyser);
                    analyser.fftSize = 256;
                    const data = new Uint8Array(analyser.frequencyBinCount);
                    const draw = () => {
                        requestAnimationFrame(draw);
                        const bars = document.querySelectorAll('.viz-bar');
                        if (!(Store.perms.speak && Store.micActive)) {
                            bars.forEach(b => b.style.height = '4px');
                            if (this.isSpeaking) {
                                document.getElementById('btn-action-mic').classList.remove('mic-on');
                                this.isSpeaking = false;
                            }
                            return;
                        }
                        analyser.getByteFrequencyData(data);
                        let sum = 0;
                        for (let i = 0; i < data.length; i++) sum += data[i];
                        const avg = sum / data.length;
                        const speaking = avg > 15;
                        if (speaking !== this.isSpeaking) {
                            const micBtn = document.getElementById('btn-action-mic');
                            if (speaking) micBtn.classList.add('mic-on');
                            else micBtn.classList.remove('mic-on');
                            this.isSpeaking = speaking;
                        }
                        const norm = Math.min(1, avg / 100);
                        bars.forEach((bar, i) => {
                            bar.style.height = `${Math.max(4, 4 + norm * 20 * Math.sin((i / bars.length) * Math.PI))}px`;
                        });
                    };
                    draw();
                }

                listen() {
                    DB.ref.child(`sig/${Store.uid}`).on('child_added', async snap => {
                        const data = snap.val();
                        snap.ref.remove();
                        try {
                            if (data.t === 'o') await this.handleOffer(data.f, data.s);
                            else if (data.t === 'a') await this.handleAnswer(data.f, data.s);
                            else if (data.t === 'i') await this.handleIce(data.f, data.i);
                        } catch (e) { /* ignore */ }
                    });
                    DB.ref.child('users').on('child_added', snap => {
                        if (snap.key !== Store.uid) setTimeout(() => this.call(snap.key), 1500);
                    });
                    DB.ref.child('users').on('child_removed', snap => {
                        if (this.pcs[snap.key]) {
                            this.pcs[snap.key].close();
                            delete this.pcs[snap.key];
                        }
                        const audio = document.getElementById(`au_${snap.key}`);
                        if (audio) audio.remove();
                    });
                }

                createPeer(uid) {
                    const pc = new RTCPeerConnection(this.config);
                    if (this.stream) this.stream.getTracks().forEach(t => pc.addTrack(t, this.stream));
                    pc.onicecandidate = e => {
                        if (e.candidate) DB.ref.child(`sig/${uid}`).push({ f: Store.uid, t: 'i', i: JSON.stringify(e.candidate) });
                    };
                    pc.onconnectionstatechange = () => {
                        if (['disconnected', 'failed'].includes(pc.connectionState)) {
                            pc.close();
                            delete this.pcs[uid];
                            if (Store.db.peers[uid]) setTimeout(() => this.call(uid), 2000);
                        }
                    };
                    pc.ontrack = e => {
                        let audio = document.getElementById(`au_${uid}`);
                        if (!audio) {
                            audio = document.createElement('audio');
                            audio.id = `au_${uid}`;
                            audio.autoplay = true;
                            document.getElementById('webrtc-audio-pool').appendChild(audio);
                        }
                        if (audio.srcObject !== e.streams[0]) {
                            audio.srcObject = e.streams[0];
                            audio.play().catch(() => document.body.addEventListener('click', () => audio.play(), { once: true }));
                        }
                    };
                    this.pcs[uid] = pc;
                    return pc;
                }

                async call(uid) {
                    if (this.pcs[uid]) return;
                    const pc = this.createPeer(uid);
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    DB.ref.child(`sig/${uid}`).push({ f: Store.uid, t: 'o', s: JSON.stringify(offer) });
                }

                async handleOffer(uid, sdp) {
                    const pc = this.createPeer(uid);
                    await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(sdp)));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    DB.ref.child(`sig/${uid}`).push({ f: Store.uid, t: 'a', s: JSON.stringify(answer) });
                }

                async handleAnswer(uid, sdp) {
                    if (this.pcs[uid]) await this.pcs[uid].setRemoteDescription(new RTCSessionDescription(JSON.parse(sdp)));
                }

                async handleIce(uid, ice) {
                    if (this.pcs[uid]) await this.pcs[uid].addIceCandidate(new RTCIceCandidate(JSON.parse(ice)));
                }
            }

            const AudioSystem = new AudioMesh();

            // --------------------------------------------------------------
            // 7. USER INTERFACE CONTROLLER
            // --------------------------------------------------------------
            class UIController {
                constructor() {
                    this.initEvents();
                    this.initColorWheel();
                    this.bindAppEvents();
                }

                initEvents() {
                    document.getElementById('btn-create-room').onclick = () => this.handleAuth(true);
                    document.getElementById('btn-join-room').onclick = () => this.handleAuth(false);
                    document.querySelectorAll('[data-tool]').forEach(btn => {
                        btn.onclick = () => { this.setTool(btn.dataset.tool); this.closeAll(); };
                    });
                    document.getElementById('btn-toggle-shapes').onclick = () => {
                        Utils.vibrate(10);
                        document.getElementById('toolbar-shapes').classList.toggle('is-visible');
                    };
                    document.getElementById('btn-action-undo').onclick = () => DB.undo();
                    document.getElementById('btn-action-mic').onclick = () => AudioSystem.toggle();
                    document.getElementById('btn-action-exit').onclick = () => { if (confirm("Xonadan chiqishni xohlaysizmi?")) location.reload(); };
                    
                    const drawers = {
                        'btn-open-settings': 'drawer-settings',
                        'btn-open-colors': 'drawer-colors',
                        'btn-open-users': 'drawer-users',
                        'btn-open-chat': 'drawer-chat'
                    };
                    for (const [btnId, drawerId] of Object.entries(drawers)) {
                        const btn = document.getElementById(btnId);
                        if (btn) btn.onclick = () => this.openDrawer(drawerId);
                    }
                    document.querySelectorAll('[data-close]').forEach(btn => btn.onclick = () => this.closeAll());
                    document.getElementById('drawer-backdrop').onclick = () => this.closeAll();

                    document.getElementById('btn-cancel-text').onclick = () => this.closeTextModal();
                    document.getElementById('btn-add-text').onclick = () => {
                        const txt = Utils.sanitize(document.getElementById('inp-text-area').value.trim()).substring(0, 300);
                        if (txt && Store.textCtx) {
                            DB.pushElement({
                                type: 'text',
                                text: txt,
                                x: Store.textCtx.x,
                                y: Store.textCtx.y,
                                s: Store.size * 4 + 16,
                                c: Store.color
                            });
                        }
                        this.closeTextModal();
                    };
                    
                    document.getElementById('inp-tool-size').oninput = e => {
                        Store.size = parseInt(e.target.value);
                        document.getElementById('val-tool-size').innerText = Store.size;
                    };
                    document.getElementById('act-undo').onclick = () => { DB.undo(); this.closeAll(); };
                    document.getElementById('act-center').onclick = () => {
                        Store.cam = { x: 0, y: 0, z: 1 };
                        AppEvents.emit('render');
                        AppEvents.emit('ui:zoom');
                        DB.syncCamera();
                        this.closeAll();
                    };
                    document.getElementById('act-clear-board').onclick = () => {
                        if (confirm("Hamma narsa o'chiriladi. Davom etilsinmi?")) DB.clearBoard();
                        this.closeAll();
                    };
                    
                    const fileImg = document.getElementById('sys-file-img');
                    const fileJson = document.getElementById('sys-file-json');
                    document.getElementById('act-image').onclick = () => { fileImg.click(); this.closeAll(); };
                    fileImg.onchange = async e => {
                        const f = e.target.files[0];
                        if (!f || f.size > 5e6) {
                            AppEvents.emit('ui:toast', { m: "5MB dan katta bo'lmasligi kerak", t: 'error' });
                            return;
                        }
                        try {
                            const data = await Utils.readFile(f);
                            const img = new Image();
                            img.onload = () => {
                                const center = Engine.toWorld(window.innerWidth / 2, window.innerHeight / 2);
                                let w = img.width, h = img.height;
                                const maxDim = 600 / Store.cam.z;
                                if (w > maxDim) { h = (maxDim / w) * h; w = maxDim; }
                                DB.pushElement({
                                    type: 'image',
                                    data: data,
                                    x: center.x - w / 2,
                                    y: center.y - h / 2,
                                    width: w,
                                    height: h
                                });
                            };
                            img.src = data;
                        } catch (e) { /* ignore */ }
                        fileImg.value = '';
                    };
                    document.getElementById('act-export').onclick = () => {
                        const a = document.createElement('a');
                        a.download = `MR_${Date.now()}.png`;
                        a.href = document.getElementById('layer-base').toDataURL();
                        a.click();
                        this.closeAll();
                    };
                    document.getElementById('act-save-json').onclick = () => {
                        const a = document.createElement('a');
                        a.download = `MR_Project.json`;
                        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(Store.db.els));
                        a.click();
                        this.closeAll();
                    };
                    document.getElementById('act-load-json').onclick = () => {
                        if (!Store.isHost) {
                            AppEvents.emit('ui:toast', { m: "Faqat host yuklay oladi", t: 'error' });
                            return;
                        }
                        fileJson.click();
                        this.closeAll();
                    };
                    fileJson.onchange = async e => {
                        const f = e.target.files[0];
                        if (!f) return;
                        try {
                            const data = JSON.parse(await Utils.readFile(f, true));
                            if (Array.isArray(data)) {
                                DB.clearBoard();
                                setTimeout(() => data.forEach(el => DB.pushElement(el)), 1000);
                                AppEvents.emit('ui:toast', { m: "Loyiha yuklandi", t: "success" });
                            }
                        } catch (err) { /* ignore */ }
                        fileJson.value = '';
                    };
                    
                    document.getElementById('btn-submit-chat').onclick = () => this.sendChat();
                    document.getElementById('inp-chat-text').onkeypress = e => { if (e.key === 'Enter') this.sendChat(); };
                    
                    window.addEventListener('keydown', e => {
                        if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
                        const k = e.key.toLowerCase();
                        if (e.ctrlKey || e.metaKey) {
                            if (k === 'z') { e.preventDefault(); DB.undo(); }
                        } else {
                            if (k === 'b') this.setTool('draw');
                            else if (k === 'e') this.setTool('erase');
                            else if (k === 'h') this.setTool('pan');
                            else if (k === 't') this.setTool('text');
                            else if (k === 'l') this.setTool('laser');
                            else if (k === 's') document.getElementById('toolbar-shapes').classList.toggle('is-visible');
                            else if (k === 'm') AudioSystem.toggle();
                            else if (k === 'c') this.openDrawer('drawer-chat');
                        }
                    });
                }

                handleAuth(isHost) {
                    const name = Utils.sanitize(document.getElementById('auth-name-inp').value.trim()).substring(0, 25);
                    if (!name) return AppEvents.emit('ui:toast', { m: "Ism kiriting", t: "error" });
                    let room = isHost ? `MR${Math.floor(1000 + Math.random() * 9000)}` : document.getElementById('auth-room-inp').value.trim().toUpperCase();
                    if (!room) return AppEvents.emit('ui:toast', { m: "Xona kodini kiriting", t: "error" });
                    
                    Store.name = name;
                    Store.isHost = isHost;
                    Store.roomId = room;
                    if (isHost) Store.hostKey = Utils.generateId('K');
                    Utils.vibrate([15, 50, 15]);
                    
                    const auth = document.getElementById('auth-gateway');
                    auth.style.opacity = '0';
                    setTimeout(() => {
                        auth.style.display = 'none';
                        document.getElementById('ui-overlay').style.display = 'block';
                        document.getElementById('ui-room-code').innerText = room;
                        if (isHost) {
                            document.getElementById('btn-open-users').style.display = 'flex';
                            document.getElementById('panel-host-controls').style.display = 'block';
                            document.getElementById('ui-participants-list').classList.add('host-active');
                        }
                        AppEvents.emit('ui:role');
                        DB.init(room);
                        Engine.init();
                        AudioSystem.init();
                        AppEvents.emit('ui:toast', { m: "Muvaffaqiyatli ulandi!", t: "success" });
                    }, 500);
                }

                setTool(tool) {
                    Utils.vibrate(10);
                    Store.tool = tool;
                    document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('is-active'));
                    document.querySelector(`[data-tool="${tool}"]`).classList.add('is-active');
                    const shapes = ['rect', 'circle', 'line', 'arrow'];
                    if (shapes.includes(tool)) document.getElementById('btn-toggle-shapes').classList.add('is-active');
                    else document.getElementById('btn-toggle-shapes').classList.remove('is-active');
                    if (!shapes.includes(tool)) document.getElementById('toolbar-shapes').classList.remove('is-visible');
                    const app = document.getElementById('app-container');
                    app.style.cursor = tool === 'pan' ? 'grab' : (tool === 'text' ? 'text' : (tool === 'laser' ? 'crosshair' : 'crosshair'));
                }

                openDrawer(id) {
                    Utils.vibrate(10);
                    this.closeAll();
                    document.getElementById('drawer-backdrop').classList.add('is-visible');
                    document.getElementById(id).classList.add('is-open');
                    if (id === 'drawer-chat') {
                        Store.unread = 0;
                        document.getElementById('badge-chat-count').style.display = 'none';
                        setTimeout(() => document.getElementById('inp-chat-text').focus(), 300);
                    }
                }

                closeAll() {
                    document.querySelectorAll('.drawer').forEach(d => d.classList.remove('is-open'));
                    document.getElementById('drawer-backdrop').classList.remove('is-visible');
                    document.getElementById('toolbar-shapes').classList.remove('is-visible');
                    this.closeTextModal();
                }

                closeTextModal() {
                    document.getElementById('modal-text-input').classList.remove('is-visible');
                    document.getElementById('inp-text-area').value = '';
                    Store.textCtx = null;
                    if (!document.querySelector('.drawer.is-open')) document.getElementById('drawer-backdrop').classList.remove('is-visible');
                }

                sendChat() {
                    if (Date.now() - Store.lastChat < 1000) {
                        AppEvents.emit('ui:toast', { m: "Juda tez yuboryapsiz", t: "warning" });
                        return;
                    }
                    Store.lastChat = Date.now();
                    const msg = Utils.sanitize(document.getElementById('inp-chat-text').value.trim()).substring(0, 300);
                    if (msg) {
                        DB.sendChat(msg);
                        document.getElementById('inp-chat-text').value = '';
                    }
                }

                initColorWheel() {
                    const cvs = document.getElementById('cvs-color-picker');
                    const ctx = cvs.getContext('2d');
                    let hue = 0.6, sat = 0.8, val = 1;
                    const drawWheel = () => {
                        const w = cvs.width, img = ctx.createImageData(w, w), data = img.data, r = w / 2;
                        for (let y = 0; y < w; y++) {
                            for (let x = 0; x < w; x++) {
                                const dx = x - r, dy = y - r, dist = Math.hypot(dx, dy);
                                if (dist <= r) {
                                    const h = (Math.atan2(dy, dx) + Math.PI) / (2 * Math.PI);
                                    const s = dist / r;
                                    const rgb = this.hsvToRgb(h, s, 1);
                                    const idx = (y * w + x) * 4;
                                    data[idx] = rgb.r;
                                    data[idx + 1] = rgb.g;
                                    data[idx + 2] = rgb.b;
                                    data[idx + 3] = 255;
                                }
                            }
                        }
                        ctx.putImageData(img, 0, 0);
                    };
                    drawWheel();
                    const updateColor = () => {
                        const rgb = this.hsvToRgb(hue, sat, val);
                        const hex = `#${((1 << 24) + (rgb.r << 16) + (rgb.g << 8) + rgb.b).toString(16).slice(1)}`;
                        Store.color = hex;
                        document.getElementById('ui-current-color').style.background = hex;
                        this.setTool('draw');
                    };
                    const pick = e => {
                        const rect = cvs.getBoundingClientRect();
                        const x = (e.clientX - rect.left) * (cvs.width / rect.width);
                        const y = (e.clientY - rect.top) * (cvs.height / rect.height);
                        const r = cvs.width / 2;
                        const dx = x - r, dy = y - r;
                        const dist = Math.hypot(dx, dy);
                        if (dist <= r) {
                            hue = (Math.atan2(dy, dx) + Math.PI) / (2 * Math.PI);
                            sat = dist / r;
                            updateColor();
                        }
                    };
                    cvs.onpointerdown = pick;
                    cvs.onpointermove = e => { if (e.buttons === 1) pick(e); };
                    document.getElementById('inp-color-bright').oninput = e => {
                        val = e.target.value / 100;
                        updateColor();
                    };
                    
                    const palette = document.getElementById('ui-quick-palette');
                    ['#ffffff', '#000000', '#64748b', '#ef4444', '#f97316', '#f59e0b', '#84cc16', '#10b981', '#06b6d4', '#2563eb', '#8b5cf6', '#d946ef'].forEach(col => {
                        const sw = document.createElement('div');
                        sw.className = 'swatch-box';
                        sw.style.background = col;
                        sw.onclick = () => {
                            Store.color = col;
                            document.getElementById('ui-current-color').style.background = col;
                            this.setTool('draw');
                            Utils.vibrate(10);
                        };
                        palette.appendChild(sw);
                    });
                }

                hsvToRgb(h, s, v) {
                    let r, g, b;
                    const i = Math.floor(h * 6);
                    const f = h * 6 - i;
                    const p = v * (1 - s);
                    const q = v * (1 - f * s);
                    const t = v * (1 - (1 - f) * s);
                    switch (i % 6) {
                        case 0: r = v; g = t; b = p; break;
                        case 1: r = q; g = v; b = p; break;
                        case 2: r = p; g = v; b = t; break;
                        case 3: r = p; g = q; b = v; break;
                        case 4: r = t; g = p; b = v; break;
                        default: r = v; g = p; b = q; break;
                    }
                    return { r: Math.round(r * 255), g: Math.round(g * 255), b: Math.round(b * 255) };
                }

                bindAppEvents() {
                    AppEvents.on('ui:zoom', () => {
                        document.getElementById('ui-zoom-level').innerText = Math.round(Store.cam.z * 100) + '%';
                    });
                    AppEvents.on('ui:role', () => {
                        const el = document.getElementById('ui-user-role');
                        if (Store.isHost) el.innerHTML = '<i data-lucide="crown" style="color:var(--state-warning)"></i> Host';
                        else if (Store.perms.draw) el.innerHTML = '<i data-lucide="pencil" style="color:var(--brand-primary)"></i> Yozuvchi';
                        else el.innerHTML = '<i data-lucide="eye" style="color:var(--text-muted)"></i> Kuzatuvchi';
                        lucide.createIcons();
                        AppEvents.emit('ui:mic');
                    });
                    AppEvents.on('ui:mic', () => {
                        const btn = document.getElementById('btn-action-mic');
                        btn.className = 'action-btn ' + (!Store.perms.speak ? 'mic-off' : (Store.micActive ? 'mic-on' : 'mic-off'));
                        btn.innerHTML = `<i data-lucide="${Store.micActive && Store.perms.speak ? 'mic' : 'mic-off'}"></i><span class="tooltip">Mikrofon (M)</span>`;
                        lucide.createIcons();
                    });
                    AppEvents.on('ui:modalText', pos => {
                        Store.textCtx = pos;
                        document.getElementById('drawer-backdrop').classList.add('is-visible');
                        document.getElementById('modal-text-input').classList.add('is-visible');
                        setTimeout(() => document.getElementById('inp-text-area').focus(), 100);
                    });
                    AppEvents.on('ui:toast', data => {
                        Utils.vibrate(data.t === 'error' ? [50, 50, 50] : 15);
                        const wrap = document.getElementById('toast-wrapper');
                        const toast = document.createElement('div');
                        toast.className = `toast-item ${data.t}`;
                        toast.innerHTML = `<i data-lucide="${data.t === 'error' ? 'shield-alert' : 'check-circle'}"></i><span>${data.m}</span>`;
                        wrap.appendChild(toast);
                        lucide.createIcons();
                        setTimeout(() => {
                            toast.style.animation = 'none';
                            toast.style.opacity = '0';
                            toast.style.transform = 'translateY(-40px)';
                            setTimeout(() => toast.remove(), 300);
                        }, 3500);
                    });
                    AppEvents.on('ui:chat', msg => {
                        const container = document.getElementById('ui-chat-messages');
                        const isMine = msg.u === Store.uid;
                        const bubble = document.createElement('div');
                        bubble.className = `msg-bubble ${isMine ? 'mine' : 'other'}`;
                        bubble.innerHTML = `<div class="msg-info">${Utils.sanitize(msg.n)} ${msg.h ? '<i data-lucide="shield-check" size="14" style="color:var(--brand-primary)"></i>' : ''}</div><div>${Utils.sanitize(msg.m)}</div><div class="msg-time">${msg.tm}</div>`;
                        container.appendChild(bubble);
                        lucide.createIcons();
                        container.scrollTop = container.scrollHeight;
                        if (!isMine && !document.getElementById('drawer-chat').classList.contains('is-open')) {
                            Store.unread++;
                            const badge = document.getElementById('badge-chat-count');
                            badge.innerText = Store.unread > 9 ? '9+' : Store.unread;
                            badge.style.display = 'flex';
                            Utils.vibrate([10, 30, 10]);
                        }
                    });
                    AppEvents.on('ui:users', () => {
                        const list = document.getElementById('ui-participants-list');
                        let html = '';
                        let count = 0;
                        Object.values(Store.db.peers).forEach(p => {
                            if (p.h) return;
                            count++;
                            html += `<div class="user-card"><div class="user-meta"><div class="avatar">${p.n.charAt(0)}</div><span>${Utils.sanitize(p.n)}</span></div><div class="perm-actions"><button class="perm-btn ${p.d ? 'is-granted' : ''}" data-u="${p.id}" data-p="d"><i data-lucide="pencil" size="18"></i></button><button class="perm-btn ${p.s ? 'is-granted' : ''}" data-u="${p.id}" data-p="s"><i data-lucide="mic" size="18"></i></button></div></div>`;
                        });
                        if (count === 0) html = `<div style="text-align:center; color:var(--text-muted); font-weight:800; margin-top:20px;">Qatnashchilar yo'q</div>`;
                        list.innerHTML = html;
                        lucide.createIcons();
                        document.getElementById('badge-users-count').innerText = count;
                        document.getElementById('badge-users-count').style.display = count > 0 ? 'flex' : 'none';
                        if (Store.isHost) {
                            list.querySelectorAll('.perm-btn').forEach(btn => {
                                btn.onclick = () => {
                                    DB.setPermission(btn.dataset.u, btn.dataset.p, !Store.db.peers[btn.dataset.u][btn.dataset.p]);
                                    Utils.vibrate(10);
                                };
                            });
                        }
                    });
                }
            }

            const UI = new UIController();
        })();
    </script>
</body>
</html>
