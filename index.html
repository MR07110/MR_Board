<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MR Board · Ultimate Figma Pro</title>
    
    <link rel="icon" type="image/png" href="mr.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="welcome-page" class="overlay">
        <div class="welcome-card">
            <div class="logo-section">
                <i data-lucide="layers" class="logo-icon"></i>
                <h1>MR Board</h1>
            </div>
            <p class="subtitle">Ultimate Pro Beyyot</p>
            
            <div class="action-group">
                <button class="btn btn-primary" onclick="UI.showModal('createRoomModal')">
                    <i data-lucide="plus-circle"></i> Yangi doska yaratish
                </button>
                <div class="divider"><span>yoki</span></div>
                <input type="text" id="roomInput" class="input-field" placeholder="Xona ID (masalan: MR-1234)">
                <button class="btn btn-secondary" onclick="UI.joinRoom()">
                    <i data-lucide="log-in"></i> Xonaga kirish
                </button>
            </div>
        </div>
    </div>

    <div class="modal" id="createRoomModal">
        <div class="modal-content">
            <h3>Yangi doska sozlamalari</h3>
            <input type="password" id="roomPassword" class="input-field" placeholder="Xona paroli (ixtiyoriy)">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="UI.closeModal('createRoomModal')">Bekor qilish</button>
                <button class="btn btn-primary" onclick="UI.createRoom()">Yaratish</button>
            </div>
        </div>
    </div>

    <div class="modal" id="clearModal">
        <div class="modal-content">
            <h3 class="danger-text">Doskani tozalash?</h3>
            <p>Barcha chizmalar butunlay o'chib ketadi. Ishonchingiz komilmi?</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="UI.closeModal('clearModal')">Bekor</button>
                <button class="btn btn-danger" onclick="Engine.clearBoard()">Tozalash</button>
            </div>
        </div>
    </div>

    <div id="app-page" class="hidden">
        
        <header class="top-bar figma-panel">
            <div class="tb-left">
                <div class="room-id-badge" onclick="UI.copyRoomId()" title="Nusxalash">
                    <i data-lucide="hash"></i>
                    <span id="roomDisplay">ROOM-ID</span>
                </div>
            </div>

            <div class="tb-center">
                <div class="user-stack">
                    <i data-lucide="users" size="14"></i>
                    <span id="userCountDisplay">1</span>
                </div>
            </div>

            <div class="tb-right">
                <div class="zoom-tool">
                    <button class="icon-btn" onclick="Engine.zoomOut()"><i data-lucide="minus"></i></button>
                    <span id="zoomDisplay" onclick="Engine.centerView()">100%</span>
                    <button class="icon-btn" onclick="Engine.zoomIn()"><i data-lucide="plus"></i></button>
                </div>
                <div class="v-divider"></div>
                <button class="icon-btn danger-hover" onclick="UI.exit()" title="Chiqish">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </header>

        <aside class="left-toolbar figma-panel">
            <button class="tool-btn active" data-tool="draw" onclick="Engine.setTool('draw')" title="Qalam (P)">
                <i data-lucide="pencil"></i>
            </button>
            <button class="tool-btn" data-tool="erase" onclick="Engine.setTool('erase')" title="O'chirg'ich (E)">
                <i data-lucide="eraser"></i>
            </button>
            <button class="tool-btn" data-tool="text" onclick="Engine.setTool('text')" title="Matn (T)">
                <i data-lucide="type"></i>
            </button>
            <button class="tool-btn" data-tool="pan" onclick="Engine.setTool('pan')" title="Surish (H)">
                <i data-lucide="hand"></i>
            </button>
            <div class="h-divider"></div>
            <button class="tool-btn" onclick="Engine.uploadImage()" title="Rasm yuklash (I)">
                <i data-lucide="image"></i>
            </button>
            <div class="spacer"></div>
            <button class="tool-btn action-btn" id="btn-undo" onclick="Engine.undo()" title="Orqaga (Ctrl+Z)">
                <i data-lucide="undo-2"></i>
            </button>
            <button class="tool-btn action-btn" id="btn-redo" onclick="Engine.redo()" title="Oldinga (Ctrl+Y)">
                <i data-lucide="redo-2"></i>
            </button>
        </aside>

        <aside class="right-panel figma-panel">
            <div class="panel-section">
                <h4 class="section-label">Stroke</h4>
                <div class="prop-row">
                    <span>Size</span>
                    <span id="sizeValue">4</span>
                </div>
                <input type="range" id="penSize" class="figma-slider" min="1" max="40" value="4">
                
                <div class="prop-row mt-10">
                    <span>Opacity</span>
                    <span id="opacityValue">100%</span>
                </div>
                <input type="range" id="penOpacity" class="figma-slider" min="0.1" max="1" step="0.1" value="1">
            </div>

            <div class="panel-section border-top">
                <h4 class="section-label">Colors</h4>
                <div class="color-grid" id="colorGrid">
                    </div>
            </div>

            <div class="panel-section border-top mt-auto">
                <button class="action-btn-full" onclick="Engine.exportPNG()">
                    <i data-lucide="download"></i> Eksport (PNG)
                </button>
                <button class="action-btn-full danger" onclick="UI.showModal('clearModal')">
                    <i data-lucide="trash-2"></i> Tozalash
                </div>
            </div>
        </aside>

        <div id="textToolbar" class="text-context-bar figma-panel hidden">
            <select id="fontFamily" class="figma-select">
                <option value="Inter">Inter</option>
                <option value="Arial">Arial</option>
                <option value="Times New Roman">Times</option>
            </select>
            <input type="number" id="fontSize" class="figma-input-small" value="24">
            <button class="tool-btn-small" id="textBold" onclick="Engine.toggleTextStyle('bold')"><i data-lucide="bold"></i></button>
            <button class="tool-btn-small" id="textItalic" onclick="Engine.toggleTextStyle('italic')"><i data-lucide="italic"></i></button>
            <button class="btn-apply" onclick="Engine.applyText()"><i data-lucide="check"></i></button>
        </div>

        <div id="imageResizeGroup" class="hidden">
            <div class="resizer tl" data-dir="tl"></div>
            <div class="resizer tr" data-dir="tr"></div>
            <div class="resizer bl" data-dir="bl"></div>
            <div class="resizer br" data-dir="br"></div>
            <div class="resize-line top"></div>
            <div class="resize-line bottom"></div>
            <div class="resize-line left"></div>
            <div class="resize-line right"></div>
        </div>

        <input type="text" id="textInput" class="hidden-text-input" placeholder="...">
        <input type="file" id="imageInput" accept="image/*" class="hidden">

        <canvas id="canvas"></canvas>
    </div>

    <script src="app.js" defer></script>
    
    <script>
        // Lucide ikonkalarni ishga tushirish
        window.addEventListener('load', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
