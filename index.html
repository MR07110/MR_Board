<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MR Studio Ultimate · Unified OS</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* ==========================================================================
           1. CSS VARIABLES & CORE STYLES (Minified for density)
           ========================================================================== */
        :root[data-theme="dark"] { --bg:#0f172a; --panel:rgba(30,41,59,0.85); --panel-hover:rgba(51,65,85,0.8); --pri:#0ea5e9; --pri-glow:rgba(14,165,233,0.25); --txt:#f8fafc; --mut:#94a3b8; --brd:rgba(255,255,255,0.1); --err:#ef4444; --succ:#10b981; }
        :root[data-theme="light"] { --bg:#f8fafc; --panel:rgba(255,255,255,0.85); --panel-hover:rgba(226,232,240,0.8); --pri:#0284c7; --pri-glow:rgba(2,132,199,0.15); --txt:#0f172a; --mut:#64748b; --brd:rgba(0,0,0,0.1); --err:#dc2626; --succ:#059669; }
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; font-family:'Inter',sans-serif; }
        body { background:var(--bg); color:var(--txt); overflow:hidden; width:100vw; height:100vh; transition:0.3s; }
        ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-thumb { background:var(--brd); border-radius:10px; }
        .hidden { display:none !important; }
        .glass { background:var(--panel); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid var(--brd); box-shadow:0 10px 30px rgba(0,0,0,0.3); }

        /* Auth Screen */
        #auth-screen { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at top right, var(--pri-glow), var(--bg)); z-index:999; }
        .auth-card { padding:40px; border-radius:24px; width:100%; max-width:400px; text-align:center; animation:pop 0.4s cubic-bezier(0.16,1,0.3,1); }
        @keyframes pop { from{opacity:0; transform:scale(0.95) translateY(10px);} to{opacity:1; transform:scale(1) translateY(0);} }
        .inp { width:100%; padding:14px; border-radius:12px; border:1px solid var(--brd); background:rgba(0,0,0,0.1); color:var(--txt); margin-bottom:12px; outline:none; text-align:center; font-size:15px; }
        .inp:focus { border-color:var(--pri); box-shadow:0 0 0 3px var(--pri-glow); }
        .btn { width:100%; padding:14px; border-radius:12px; border:none; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:0.2s; margin-bottom:10px; }
        .btn-pri { background:var(--pri); color:#fff; } .btn-pri:active { transform:scale(0.96); }
        .btn-out { background:transparent; border:1px solid var(--brd); color:var(--txt); } .btn-out:hover { background:var(--panel-hover); }

        /* Workspace & C-Toolbar */
        #workspace { display:none; width:100%; height:100%; position:relative; }
        canvas { display:block; width:100%; height:100%; cursor:crosshair; touch-action:none; }
        .status-pill { position:fixed; top:20px; right:20px; padding:10px 20px; border-radius:50px; display:flex; align-items:center; gap:10px; font-weight:600; font-size:13px; z-index:100; }
        .c-toolbar { position:fixed; top:20px; left:20px; bottom:20px; display:grid; grid-template-columns:60px 1fr; grid-template-rows:60px 1fr 60px; gap:12px; z-index:100; pointer-events:none; }
        .pnl { pointer-events:auto; border-radius:20px; display:flex; align-items:center; justify-content:center; }
        
        .c-top { grid-column:1/3; grid-row:1; padding:0 20px; justify-content:flex-start; gap:12px; transition:0.3s; transform-origin:left center; }
        .clr { width:24px; height:24px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:0.2s; }
        .clr.act { border-color:var(--txt); transform:scale(1.2); }
        .slider { -webkit-appearance:none; width:90px; height:4px; background:var(--brd); border-radius:4px; outline:none; }
        .slider::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--pri); cursor:pointer; border:2px solid var(--bg); }

        .c-left { grid-column:1; grid-row:2; flex-direction:column; gap:6px; padding:10px 0; justify-content:flex-start; }
        .t-btn { width:44px; height:44px; border-radius:14px; border:none; background:transparent; color:var(--mut); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.2s; position:relative; }
        .t-btn:hover { background:var(--panel-hover); color:var(--txt); }
        .t-btn.act { background:var(--pri-glow); color:var(--pri); }
        .divider { width:60%; height:1px; background:var(--brd); margin:4px 0; }
        .v-div { width:1px; height:24px; background:var(--brd); margin:0 6px; }

        .c-bot { grid-column:1/3; grid-row:3; padding:0 12px; justify-content:flex-start; gap:6px; width:max-content; }
        
        /* Video Grid & Overlays */
        .vid-grid { position:fixed; right:20px; top:80px; width:220px; display:flex; flex-direction:column; gap:10px; z-index:90; pointer-events:none; }
        .vid-card { width:100%; height:130px; background:#000; border-radius:16px; overflow:hidden; position:relative; pointer-events:auto; border:1px solid var(--brd); }
        .vid-card video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
        .vid-lbl { position:absolute; bottom:6px; left:6px; background:rgba(0,0,0,0.6); color:#fff; font-size:11px; padding:4px 8px; border-radius:6px; display:flex; align-items:center; gap:6px; }
        .aud-dot { width:6px; height:6px; border-radius:50%; background:var(--succ); transition:0.1s; }
        .aud-dot.spk { transform:scale(1.5); box-shadow:0 0 8px var(--succ); }

        #liveTxt { position:fixed; background:transparent; border:1px dashed var(--pri); color:var(--txt); font-weight:600; outline:none; display:none; z-index:90; padding:2px 4px; white-space:pre; min-width:10px; }
        .toast-box { position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
        .toast { background:var(--txt); color:var(--bg); padding:10px 20px; border-radius:50px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px; animation:tst 0.3s cubic-bezier(0.16,1,0.3,1); }
        @keyframes tst { from{opacity:0; transform:translateY(-20px);} to{opacity:1; transform:translateY(0);} }

        /* More Menu */
        .more-menu { position:absolute; bottom:70px; left:0; padding:6px; border-radius:16px; display:none; flex-direction:column; gap:2px; min-width:200px; z-index:200; transform-origin:bottom left; }
        .more-menu.show { display:flex; animation:pop 0.2s; }
        .m-item { padding:12px; border-radius:10px; cursor:pointer; font-size:13px; font-weight:500; display:flex; align-items:center; gap:10px; transition:0.2s; }
        .m-item:hover { background:var(--panel-hover); }
        .danger { color:var(--err); } .danger:hover { background:rgba(239,68,68,0.1); }
    </style>
</head>
<body>

<div id="toastBox" class="toast-box"></div>

<div id="auth-screen">
    <div class="auth-card glass">
        <i data-lucide="layers" style="color:var(--pri); width:40px; height:40px; margin-bottom:10px;"></i>
        <h1 style="font-size:24px; margin-bottom:20px;">MR Studio OS</h1>
        
        <input type="text" id="uName" class="inp" placeholder="Ismingizni kiriting" autocomplete="off" spellcheck="false">
        <button class="btn btn-pri" id="btnCreate"><i data-lucide="shield-check"></i> Dars Yaratish (Admin)</button>
        
        <div style="margin:15px 0; color:var(--mut); font-size:11px; font-weight:600; letter-spacing:1px;">YOKI</div>
        
        <input type="text" id="rCode" class="inp" placeholder="KOD (Masalan: MR-1234)" style="text-transform:uppercase;" autocomplete="off">
        <button class="btn btn-out" id="btnJoin"><i data-lucide="log-in"></i> Darsga Kirish</button>
    </div>
</div>

<div id="workspace">
    
    <div class="status-pill glass">
        <i id="roleIco" data-lucide="user" size="16" style="color:var(--pri)"></i>
        <span id="roleTxt">Yuklanmoqda...</span>
        <div class="v-div"></div>
        <span id="codeDisplay" style="color:var(--pri); cursor:pointer; font-family:monospace;" title="Nusxalash">KOD</span>
    </div>

    <div class="c-toolbar" id="toolbar" style="display:none;">
        
        <div class="pnl glass c-top" id="topPnl">
            <div class="clr act" style="background:#0ea5e9;" data-c="#0ea5e9"></div>
            <div class="clr" style="background:#ef4444;" data-c="#ef4444"></div>
            <div class="clr" style="background:#10b981;" data-c="#10b981"></div>
            <div class="clr" style="background:#f59e0b;" data-c="#f59e0b"></div>
            <div class="clr" style="background:#f8fafc;" data-c="#f8fafc"></div>
            <div class="v-div"></div>
            <input type="range" id="sizeSld" class="slider" min="2" max="40" value="4">
        </div>

        <div class="pnl glass c-left">
            <button class="t-btn act" data-t="draw" title="Qalam"><i data-lucide="pencil"></i></button>
            <button class="t-btn" data-t="erase" title="O'chirg'ich"><i data-lucide="eraser"></i></button>
            <div class="divider"></div>
            <button class="t-btn" data-t="line" title="Chiziq"><i data-lucide="minus"></i></button>
            <button class="t-btn" data-t="rect" title="To'rtburchak"><i data-lucide="square"></i></button>
            <button class="t-btn" data-t="circle" title="Aylana"><i data-lucide="circle"></i></button>
            <button class="t-btn" data-t="text" title="Matn"><i data-lucide="type"></i></button>
            <div class="divider"></div>
            <button class="t-btn" data-t="pan" title="Surish"><i data-lucide="hand"></i></button>
            <button class="t-btn" id="btnUndo" title="Orqaga"><i data-lucide="undo-2"></i></button>
        </div>

        <div class="pnl glass c-bot">
            <button class="t-btn" id="btnCam" title="Kamera"><i data-lucide="video-off"></i></button>
            <button class="t-btn" id="btnMic" title="Mikrofon"><i data-lucide="mic-off"></i></button>
            <div class="v-div"></div>
            <button class="t-btn" id="btnTheme" title="Mavzu"><i data-lucide="moon" id="thmIco"></i></button>
            <button class="t-btn" id="btnMenu" title="Menyu"><i data-lucide="more-horizontal"></i></button>
            
            <div class="more-menu glass" id="menu">
                <div class="m-item" id="btnCenter"><i data-lucide="target" size="16"></i> Markazga qaytish</div>
                <div class="m-item" id="btnSave"><i data-lucide="download" size="16"></i> Doskani saqlash</div>
                <div class="divider" style="width:100%; margin:4px 0;"></div>
                <div class="m-item danger hidden" id="btnClear"><i data-lucide="trash-2" size="16"></i> Tozalash</div>
                <div class="m-item danger" onclick="location.reload()"><i data-lucide="log-out" size="16"></i> Chiqish</div>
            </div>
        </div>
    </div>

    <div class="vid-grid" id="vidGrid">
        <div class="vid-card hidden" id="locVidBox">
            <video id="locVid" autoplay playsinline muted></video>
            <div class="vid-lbl"><div class="aud-dot" id="locAud"></div> Siz</div>
        </div>
    </div>

    <div id="liveTxt" contenteditable="true" spellcheck="false"></div>
    <div id="audCont" class="hidden"></div>
    <canvas id="cvs"></canvas>
</div>

<script>
    lucide.createIcons();

    // ==========================================================================
    // 1. FIREBASE & STATE
    // ==========================================================================
    if (!firebase.apps.length) firebase.initializeApp({ apiKey: "AIzaSyDvbG7fChb2LN_nJhwTF1iMKMXNPcuGk5Y", databaseURL: "https://tictactoe-26434-default-rtdb.firebaseio.com", projectId: "tictactoe-26434" });
    const db = firebase.database();

    const S = {
        u: { id: 'u_'+Math.random().toString(36).substr(2,6), n: '', isT: false, canD: false },
        r: { id: '', code: '', ref: null },
        els: {}, act: {}, cur: {},
        t: 'draw', c: '#0ea5e9', s: 4, thm: 'dark',
        cam: { x:0, y:0, sc:1 },
        drw: false, lPos: {x:0,y:0},
        med: { v: false, a: false }
    };

    const Tst = (m, t='info') => {
        const b = document.getElementById('toastBox');
        const e = document.createElement('div'); e.className = 'toast';
        e.innerHTML = `<i data-lucide="${t==='succ'?'check-circle':t==='err'?'alert-triangle':'info'}" size="16" style="color:var(--${t})"></i> ${m}`;
        b.appendChild(e); lucide.createIcons();
        setTimeout(() => { e.style.opacity=0; setTimeout(()=>e.remove(),300); }, 3000);
    };

    const U = {
        wP: (x,y) => ({ x:(x-S.cam.x)/S.cam.sc, y:(y-S.cam.y)/S.cam.sc }),
        sP: (x,y) => ({ x:x*S.cam.sc+S.cam.x, y:y*S.cam.sc+S.cam.y }),
        hex: h => { const n=parseInt(h.slice(1),16); return `rgb(${(n>>16)&255}, ${(n>>8)&255}, ${n&255})`; }
    };

    // ==========================================================================
    // 2. LOGIC & BINDINGS (BOG'LANISHLAR)
    // ==========================================================================
    
    // Auth
    document.getElementById('btnCreate').onclick = async () => {
        const n = document.getElementById('uName').value.trim();
        if(!n) return Tst("Ism kiriting!", "err");
        S.u.n = n; S.u.isT = true; S.u.canD = true;
        const id = 'rm_' + Date.now().toString(36);
        const cd = 'MR-' + Math.floor(1000 + Math.random()*9000);
        await db.ref('mr_alias/'+cd).set(id);
        S.r.code = cd; DB.init(id);
        Tst("Dars ochildi!", "succ");
    };

    document.getElementById('btnJoin').onclick = async () => {
        const c = document.getElementById('rCode').value.trim().toUpperCase();
        const n = document.getElementById('uName').value.trim();
        if(!n || !c) return Tst("Ism va Kod kiriting!", "err");
        const snp = await db.ref('mr_alias/'+c).once('value');
        if(snp.exists()) { S.u.n = n; S.u.isT = false; S.r.code = c; DB.init(snp.val()); Tst("Kirdingiz!","succ"); } 
        else Tst("Kod xato!", "err");
    };

    document.getElementById('codeDisplay').onclick = () => { navigator.clipboard.writeText(S.r.code); Tst("Nusxalandi!","succ"); };

    // Toolbar Bindings
    document.getElementById('sizeSld').oninput = e => S.s = parseInt(e.target.value);
    
    document.querySelectorAll('.clr').forEach(b => b.onclick = () => {
        S.c = b.dataset.c;
        document.querySelectorAll('.clr').forEach(d => d.classList.toggle('act', d.dataset.c === S.c));
    });

    document.querySelectorAll('.t-btn[data-t]').forEach(b => b.onclick = () => {
        S.t = b.dataset.t;
        document.querySelectorAll('.t-btn[data-t]').forEach(d => d.classList.toggle('act', d.dataset.t === S.t));
        const tp = document.getElementById('topPnl');
        if(['pan','text'].includes(S.t)) { tp.style.transform='scaleX(0)'; tp.style.opacity=0; } 
        else { tp.style.transform='scaleX(1)'; tp.style.opacity=1; }
        if(S.t !== 'text') document.getElementById('liveTxt').style.display = 'none';
    });

    document.getElementById('btnTheme').onclick = () => {
        S.thm = S.thm === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', S.thm);
        document.getElementById('thmIco').setAttribute('data-lucide', S.thm === 'dark' ? 'moon' : 'sun');
        lucide.createIcons();
    };

    document.getElementById('btnMenu').onclick = () => document.getElementById('menu').classList.toggle('show');
    window.onclick = e => { if(!e.target.closest('#menu') && !e.target.closest('#btnMenu')) document.getElementById('menu').classList.remove('show'); };
    
    document.getElementById('btnUndo').onclick = () => DB.ud();
    document.getElementById('btnClear').onclick = () => { if(confirm("Tozalansinmi?")) DB.clr(); };
    document.getElementById('btnCenter').onclick = () => Cvs.cntr();
    document.getElementById('btnSave').onclick = () => Cvs.dnld();

    // ==========================================================================
    // 3. CANVAS ENGINE (Fast Native 2D)
    // ==========================================================================
    const Cvs = {
        el: document.getElementById('cvs'), ctx: null, tP: null,
        init() {
            this.ctx = this.el.getContext('2d', { alpha:false, desynchronized:true });
            this.rsz(); window.onresize = () => this.rsz();
            this.el.onpointerdown = e => this.st(e);
            window.onpointermove = e => this.mv(e);
            window.onpointerup = () => this.en();
            this.el.onwheel = e => this.zm(e);
            
            const txt = document.getElementById('liveTxt');
            txt.onblur = () => this.svT();
            txt.onkeydown = e => { if(e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); txt.blur(); } if(e.key==='Escape') txt.blur(); };
            
            this.lp();
        },
        rsz() { this.el.width = window.innerWidth; this.el.height = window.innerHeight; },
        cntr() { S.cam = {x:0, y:0, sc:1}; if(S.u.isT) DB.sC(); document.getElementById('menu').classList.remove('show'); },
        dnld() { const a=document.createElement('a'); a.download=`MR_${Date.now()}.png`; a.href=this.el.toDataURL(); a.click(); document.getElementById('menu').classList.remove('show'); },
        
        stT(w, e) {
            const i = document.getElementById('liveTxt');
            i.style.left = e.clientX+'px'; i.style.top = (e.clientY-15)+'px'; i.style.fontSize = (24*S.cam.sc)+'px'; i.style.color = S.c;
            i.style.display = 'block'; i.innerText = ''; i.focus(); this.tP = w;
        },
        svT() {
            const i = document.getElementById('liveTxt'), v = i.innerText.trim();
            if(v && this.tP) DB.sv({ type:'text', txt:v, x:this.tP.x, y:this.tP.y, c:S.c, s:24 });
            i.style.display='none'; i.innerText=''; this.tP=null;
        },

        st(e) {
            if(!S.u.canD && S.t !== 'pan') return;
            const w = U.wP(e.clientX, e.clientY);
            if(S.t === 'text') return this.stT(w, e);
            
            S.drw = true; S.lPos = {x:e.clientX, y:e.clientY};
            if(S.t !== 'pan') {
                this.cId = U.generateId();
                const isE = S.t === 'erase';
                const d = { type:S.t, c: isE?(S.thm==='dark'?'#0f172a':'#f8fafc'):S.c, s: isE?60:S.s, pts:[w] };
                if(['rect','circle','line'].includes(S.t)) { d.x=w.x; d.y=w.y; d.ex=w.x; d.ey=w.y; delete d.pts; }
                DB.sA(this.cId, d);
            }
        },
        mv(e) {
            if(!S.drw) return;
            const cx=e.clientX, cy=e.clientY, w=U.wP(cx,cy);
            if(Date.now()%4===0) DB.uC(w);

            if(S.t==='pan') { S.cam.x += cx-S.lPos.x; S.cam.y += cy-S.lPos.y; if(S.u.isT) DB.sC(); }
            else if(['draw','erase'].includes(S.t)) S.r.ref.child('act/'+this.cId+'/pts').push(w);
            else if(['rect','circle','line'].includes(S.t)) S.r.ref.child('act/'+this.cId).update({ex:w.x, ey:w.y});
            S.lPos = {x:cx, y:cy};
        },
        en() {
            if(!S.drw) return; S.drw = false;
            if(S.t !== 'pan' && this.cId) { S.r.ref.child('act/'+this.cId).once('value', s => { if(s.exists()){ DB.sv(s.val()); s.ref.remove(); }}); }
        },
        zm(e) {
            if(!S.u.isT && !S.u.canD) return;
            const w = U.wP(e.clientX, e.clientY);
            S.cam.sc *= e.deltaY>0 ? 0.9 : 1.1; S.cam.sc = Math.max(0.1, Math.min(S.cam.sc, 5));
            S.cam.x = e.clientX - w.x*S.cam.sc; S.cam.y = e.clientY - w.y*S.cam.sc;
            if(S.u.isT) DB.sC();
        },
        
        lp() {
            const x = this.ctx;
            x.setTransform(1,0,0,1,0,0); x.fillStyle=S.thm==='dark'?'#0f172a':'#f8fafc'; x.fillRect(0,0,this.el.width,this.el.height);
            
            x.fillStyle = S.thm==='dark'?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)';
            const gs=40*S.cam.sc, ox=S.cam.x%gs, oy=S.cam.y%gs;
            x.beginPath(); for(let i=ox; i<this.el.width; i+=gs) for(let j=oy; j<this.el.height; j+=gs) x.rect(i,j,2,2); x.fill();
            
            x.setTransform(S.cam.sc,0,0,S.cam.sc,S.cam.x,S.cam.y);
            
            const drw = o => {
                if(!o) return; x.beginPath(); x.strokeStyle=o.c; x.fillStyle=o.c; x.lineWidth=o.s/S.cam.sc; x.lineCap='round'; x.lineJoin='round';
                if(['draw','erase'].includes(o.type) && o.pts?.length) {
                    x.moveTo(o.pts[0].x, o.pts[0].y);
                    if(o.pts.length<3) { for(let i=1;i<o.pts.length;i++) x.lineTo(o.pts[i].x, o.pts[i].y); }
                    else { for(let i=1;i<o.pts.length-2;i++) x.quadraticCurveTo(o.pts[i].x, o.pts[i].y, (o.pts[i].x+o.pts[i+1].x)/2, (o.pts[i].y+o.pts[i+1].y)/2); const l=o.pts.length-1; x.quadraticCurveTo(o.pts[l-1].x, o.pts[l-1].y, o.pts[l].x, o.pts[l].y); }
                    x.stroke();
                } else if(o.type==='rect') x.strokeRect(o.x,o.y,o.ex-o.x,o.ey-o.y);
                else if(o.type==='circle') { const rx=Math.abs(o.ex-o.x)/2, ry=Math.abs(o.ey-o.y)/2; x.ellipse(o.x+rx*(o.ex<o.x?-1:1), o.y+ry*(o.ey<o.y?-1:1), rx, ry, 0, 0, Math.PI*2); x.stroke(); }
                else if(o.type==='line') { x.moveTo(o.x,o.y); x.lineTo(o.ex,o.ey); x.stroke(); }
                else if(o.type==='text') { x.font=`600 ${o.s}px Inter`; x.fillText(o.txt, o.x, o.y); }
            };

            Object.values(S.els).forEach(drw); Object.values(S.act).forEach(drw);

            x.setTransform(1,0,0,1,0,0);
            Object.values(S.cur).forEach(c => {
                if(c.id===S.u.id || !c.x) return; const px=c.x*S.cam.sc+S.cam.x, py=c.y*S.cam.sc+S.cam.y;
                x.beginPath(); x.moveTo(px,py); x.lineTo(px+12,py+12); x.lineTo(px+4,py+12); x.lineTo(px,py+18); x.closePath();
                x.fillStyle=c.isT?'#0ea5e9':'#ef4444'; x.fill(); x.strokeStyle='#fff'; x.lineWidth=1.5; x.stroke();
                x.font='600 11px Inter'; x.fillStyle=S.thm==='dark'?'#fff':'#000'; x.fillText(c.n, px+14, py+14);
            });
            requestAnimationFrame(() => this.lp());
        }
    };

    // ==========================================================================
    // 4. WEBRTC MEDIA
    // ==========================================================================
    const Med = {
        s: null, p: {}, cfg: { iceServers:[{urls:'stun:stun.l.google.com:19302'}] },
        init() {
            document.getElementById('btnCam').onclick = () => this.tgl('v', 'btnCam', 'video');
            document.getElementById('btnMic').onclick = () => this.tgl('a', 'btnMic', 'mic');
        },
        async tgl(t, bid, ico) {
            S.med[t] = !S.med[t]; const b=document.getElementById(bid);
            if(S.med[t]) { b.classList.add('act'); b.innerHTML=`<i data-lucide="${ico}"></i>`; await this.strt(); }
            else { b.classList.remove('act'); b.innerHTML=`<i data-lucide="${ico}-off"></i>`; if(this.s) this.s[t==='v'?'getVideoTracks':'getAudioTracks']().forEach(tr=>tr.enabled=false); if(t==='v') document.getElementById('locVidBox').classList.add('hidden'); }
            lucide.createIcons();
        },
        async strt() {
            if(!this.s) {
                try { this.s = await navigator.mediaDevices.getUserMedia({video:true, audio:true}); document.getElementById('locVid').srcObject=this.s; this.lsn(); this.anl(this.s, 'locAud'); } 
                catch(e) { Tst("Ruxsat yo'q!","err"); S.med.v=false; S.med.a=false; return; }
            }
            this.s.getVideoTracks()[0].enabled = S.med.v; this.s.getAudioTracks()[0].enabled = S.med.a;
            if(S.med.v) document.getElementById('locVidBox').classList.remove('hidden');
        },
        anl(st, id) {
            try { const x=new(window.AudioContext||window.webkitAudioContext)(); const a=x.createAnalyser(); x.createMediaStreamSource(st).connect(a); a.fftSize=64; const d=new Uint8Array(a.frequencyBinCount); const c=()=>{requestAnimationFrame(c); a.getByteFrequencyData(d); const avg=d.reduce((a,b)=>a+b)/d.length; const el=document.getElementById(id); if(el) el.classList.toggle('spk', avg>10);}; c(); } catch(e){}
        },
        lsn() {
            S.r.ref.child('sig/'+S.u.id).on('child_added', async sn => { const d=sn.val(); sn.ref.remove(); if(d.t==='off') await this.hOff(d.f, d.s); else if(d.t==='ans') await this.hAns(d.f, d.s); else if(d.t==='ice') await this.hIce(d.f, d.i); });
            S.r.ref.child('usrs').on('child_added', sn => { if(sn.key!==S.u.id) setTimeout(()=>this.cl(sn.key), 1000); });
        },
        cP(id) {
            const pc = new RTCPeerConnection(this.cfg); if(this.s) this.s.getTracks().forEach(t=>pc.addTrack(t, this.s));
            pc.onicecandidate = e => e.candidate && S.r.ref.child('sig/'+id).push({t:'ice', i:JSON.stringify(e.candidate), f:S.u.id});
            pc.ontrack = e => {
                if(e.track.kind==='video') { let c=document.getElementById('vc_'+id); if(!c) { c=document.createElement('div'); c.className='vid-card'; c.id='vc_'+id; c.innerHTML=`<video id="v_${id}" autoplay playsinline></video><div class="vid-lbl"><div class="aud-dot" id="ad_${id}"></div> Talaba</div>`; document.getElementById('vidGrid').appendChild(c); } document.getElementById('v_'+id).srcObject=e.streams[0]; }
                else { let a=document.getElementById('au_'+id); if(!a) { a=document.createElement('audio'); a.id='au_'+id; a.autoplay=true; document.getElementById('audCont').appendChild(a); } a.srcObject=e.streams[0]; this.anl(e.streams[0], 'ad_'+id); }
            };
            pc.onconnectionstatechange = () => { if(['disconnected','failed'].includes(pc.connectionState)) { document.getElementById('vc_'+id)?.remove(); delete this.p[id]; } };
            pc.onnegotiationneeded = async () => { const o=await pc.createOffer(); await pc.setLocalDescription(o); S.r.ref.child('sig/'+id).push({t:'off', s:JSON.stringify(o), f:S.u.id}); };
            this.p[id]=pc; return pc;
        },
        async cl(id) { if(!this.p[id]) this.cP(id); },
        async hOff(id, s) { const pc=this.p[id]||this.cP(id); await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(s))); const a=await pc.createAnswer(); await pc.setLocalDescription(a); S.r.ref.child('sig/'+id).push({t:'ans', s:JSON.stringify(a), f:S.u.id}); },
        async hAns(id, s) { await this.p[id]?.setRemoteDescription(new RTCSessionDescription(JSON.parse(s))); },
        async hIce(id, i) { await this.p[id]?.addIceCandidate(new RTCIceCandidate(JSON.parse(i))); }
    };

    // ==========================================================================
    // 5. DATABASE SYNC
    // ==========================================================================
    const DB = {
        init(id) {
            S.r.id = id; S.r.ref = db.ref('mr_uni_v7/'+id);
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('workspace').style.display = 'block';
            document.getElementById('codeDisplay').innerText = S.r.code;
            
            document.getElementById('roleTxt').innerText = S.u.isT ? "Ustoz" : (S.u.canD ? "Yozish (Bor)" : "Kuzatuv");
            document.getElementById('roleIco').setAttribute('data-lucide', S.u.isT ? 'shield-check' : 'user');
            document.getElementById('toolbar').style.display = (S.u.isT || S.u.canD) ? 'grid' : 'none';
            document.getElementById('btnClear').classList.toggle('hidden', !S.u.isT);
            if(!S.u.isT && !S.u.canD) Cvs.setTool('pan'); lucide.createIcons();

            const my = S.r.ref.child('usrs/'+S.u.id);
            my.set({ id:S.u.id, n:S.u.n, isT:S.u.isT, canD:S.u.canD }); my.onDisconnect().remove(); S.r.ref.child('prs/'+S.u.id).onDisconnect().remove();

            this.lsn(); Cvs.init(); Med.init();
        },
        lsn() {
            S.r.ref.child('els').on('value', s => S.els = Object.values(s.val()||{}));
            S.r.ref.child('act').on('value', s => S.act = s.val()||{});
            S.r.ref.child('prs').on('value', s => S.cur = s.val()||{});
            S.r.ref.child('usrs').on('value', s => {
                const u = s.val()||{}, me = u[S.u.id];
                if(me && !S.u.isT) { if(S.u.canD !== me.canD) { S.u.canD=me.canD; Tst(me.canD?"Ruxsat berildi":"Ruxsat olindi", me.canD?'succ':'err'); document.getElementById('roleTxt').innerText=me.canD?"Yozish (Bor)":"Kuzatuv"; document.getElementById('toolbar').style.display=me.canD?'grid':'none'; if(!me.canD) { S.t='pan'; document.querySelectorAll('.t-btn').forEach(b=>b.classList.toggle('act',b.dataset.t==='pan')); document.getElementById('topPnl').style.opacity=0; } } } else if(!me && !S.u.isT) { alert("Chiqarildingiz"); location.reload(); }
            });
            if(!S.u.isT) S.r.ref.child('cam').on('value', s => { if(!S.u.canD && s.val()) S.cam = s.val(); });
        },
        sv(e) { S.r.ref.child('els').push(e); }, sA(i, d) { S.act[i]=d; S.r.ref.child('act/'+i).set(d); },
        uC(p) { S.r.ref.child('prs/'+S.u.id).set({ id:S.u.id, x:p.x, y:p.y, n:S.u.n, isT:S.u.isT }); }, sC() { S.r.ref.child('cam').set(S.cam); },
        ud() { S.r.ref.child('els').orderByKey().limitToLast(1).once('value', s=>s.forEach(c=>c.ref.remove())); }, clr() { S.r.ref.child('els').remove(); document.getElementById('menu').classList.remove('show'); }
    };

    U.generateId = () => S.u.id + '_' + Date.now();
</script>
