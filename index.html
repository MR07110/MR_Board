<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MR Board · Professional Studio</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* ==========================================================================
           1. ASOSIY SOZLAMALAR VA O'ZGARUVCHILAR (CSS VARIABLES)
           ========================================================================== */
        :root {
            /* Ranglar */
            --bg-dark: #09090b;
            --bg-surface: #18181b;
            --bg-surface-light: #27272a;
            --bg-overlay: rgba(9, 9, 11, 0.8);
            
            --border-color: #3f3f46;
            --border-light: #52525b;
            
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --accent-blue-alpha: rgba(59, 130, 246, 0.15);
            
            --success: #10b981;
            --danger: #ef4444;
            --danger-alpha: rgba(239, 68, 68, 0.15);
            --warning: #f59e0b;

            /* O'lchamlar va Soya */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-pill: 9999px;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.25);
            
            /* Animatsiyalar */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --z-canvas: 1;
            --z-ui: 10;
            --z-modal: 100;
            --z-toast: 1000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Mobil qurilmalarda matn belgilanishini va imo-ishoralarni to'xtatish */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        /* Umumiy tugma stillari */
        button {
            border: none;
            background: none;
            color: inherit;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        input, textarea {
            font-family: inherit;
            outline: none;
        }

        /* ==========================================================================
           2. KANVAS (DOSKA) QISMI
           ========================================================================== */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: var(--z-canvas);
            background-color: var(--bg-dark);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none; /* Muhim: brauzerning standart zoom va scrollini o'chiradi */
        }

        /* ==========================================================================
           3. KIRISH (WELCOME) SAHIFASI
           ========================================================================== */
        #welcome-screen {
            position: fixed;
            inset: 0;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, #1e1e28 0%, transparent 70%);
            z-index: var(--z-modal);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity var(--transition-normal);
        }

        .auth-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-lg);
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--bg-surface-light);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 16px;
            transition: all var(--transition-fast);
        }

        .form-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px var(--accent-blue-alpha);
        }

        .btn-main {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all var(--transition-fast);
            margin-bottom: 12px;
        }

        .btn-primary {
            background-color: var(--accent-blue);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:hover { background-color: var(--accent-blue-hover); transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(1px); }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover { background-color: var(--bg-surface-light); }

        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }
        
        .auth-divider span { padding: 0 10px; }

        /* ==========================================================================
           4. ASOSIY INTERFEYS (UI)
           ========================================================================== */
        #app-ui {
            display: none;
            position: absolute;
            inset: 0;
            pointer-events: none; /* Faqat tugmalar bosiladi, orqa fon kanvasga o'tadi */
            z-index: var(--z-ui);
        }

        /* --- Yuqori Status Bar --- */
        .status-bar {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }

        .status-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status-badge {
            background-color: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
            box-shadow: var(--shadow-sm);
        }

        /* --- Pastki Boshqaruv Paneli (Bottom Toolbar) --- */
        .toolbar-wrapper {
            position: absolute;
            bottom: 24px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
            padding: 0 16px;
        }

        .main-toolbar {
            background-color: rgba(24, 24, 27, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: auto;
            box-shadow: var(--shadow-lg);
            max-width: 100%;
            overflow-x: auto;
            /* Scrollbarni yashirish */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .main-toolbar::-webkit-scrollbar { display: none; }

        .tool-separator {
            width: 1px;
            height: 28px;
            background-color: var(--border-color);
            margin: 0 4px;
        }

        .tool-btn {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            position: relative;
            flex-shrink: 0;
        }

        .tool-btn:hover {
            color: var(--text-primary);
            background-color: var(--bg-surface-light);
        }

        .tool-btn:active { transform: scale(0.92); }

        .tool-btn.active {
            color: var(--accent-blue);
            background-color: var(--accent-blue-alpha);
        }

        /* Ovoz vizualizatsiyasi (Toolbar ichida) */
        .audio-monitor {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 0 12px;
            height: 44px;
            border-radius: 16px;
            border: 1px inset rgba(255,255,255,0.05);
        }

        .bars-container {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 20px;
        }

        .audio-bar {
            width: 3px;
            min-height: 4px;
            background-color: var(--accent-blue);
            border-radius: 3px;
            transition: height 0.05s ease; /* Tezkor reaksiya */
        }

        .db-text {
            font-size: 11px;
            font-family: monospace;
            color: var(--text-secondary);
            width: 45px;
            text-align: right;
        }

        /* Mikrofon holatlari */
        .mic-active {
            color: var(--success) !important;
            background-color: rgba(16, 185, 129, 0.15) !important;
        }
        
        .mic-speaking {
            animation: pulse-mic 1.5s infinite;
        }

        @keyframes pulse-mic {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .mic-muted {
            color: var(--danger) !important;
            background-color: var(--danger-alpha) !important;
        }

        /* Rangi ko'rsatkichi */
        .color-preview-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 0 0 2px transparent;
            margin: 0 5px;
            transition: transform 0.2s;
        }
        .color-preview-btn:hover { transform: scale(1.1); }

        /* Bildirishnoma (Badge) */
        .badge-count {
            position: absolute;
            top: 2px;
            right: 2px;
            background-color: var(--danger);
            color: white;
            font-size: 10px;
            font-weight: bold;
            height: 18px;
            min-width: 18px;
            padding: 0 5px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bg-surface);
        }

        /* ==========================================================================
           5. YON MENYULAR (SIDEBARS) VA OVERLAY
           ========================================================================== */
        .overlay {
            position: fixed;
            inset: 0;
            background-color: var(--bg-overlay);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: var(--z-modal);
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-normal);
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            width: 100%;
            max-width: 380px;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            z-index: calc(var(--z-modal) + 1);
            transform: translateX(-100%);
            transition: transform var(--transition-normal);
            display: flex;
            flex-direction: column;
            pointer-events: auto;
        }

        .sidebar.right {
            left: auto;
            right: 0;
            border-right: none;
            border-left: 1px solid var(--border-color);
            transform: translateX(100%);
        }

        .sidebar.active {
            transform: translateX(0);
            box-shadow: var(--shadow-lg);
        }

        .sidebar-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--bg-surface-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .close-btn:hover { background-color: var(--border-color); color: white; }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* Sidebar Sectionlari */
        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            font-weight: 600;
        }

        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .menu-card {
            background-color: var(--bg-surface-light);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 500;
        }

        .menu-card:hover {
            background-color: var(--border-color);
            transform: translateY(-2px);
        }
        
        .menu-card:active { transform: scale(0.95); }

        .menu-card.danger {
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.3);
            background-color: rgba(239, 68, 68, 0.05);
        }

        /* Qalinlik Slayderi */
        .slider-wrap {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
            background-color: var(--bg-surface-light);
            padding: 16px;
            border-radius: var(--radius-md);
        }

        input[type=range] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: var(--border-color);
            border-radius: 6px;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-blue);
            border: 3px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        /* ==========================================================================
           6. RANG TANLAGICH (COLOR WHEEL)
           ========================================================================== */
        .color-wheel-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            max-width: 260px;
            margin: 0 auto 24px;
        }

        #colorWheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            cursor: crosshair;
            box-shadow: 0 0 0 4px var(--bg-surface-light), var(--shadow-lg);
        }

        .color-result {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-surface-light);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
        }

        .color-box {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .quick-colors {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .quick-color-btn {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        .quick-color-btn:hover { transform: scale(1.1); border-color: white; }

        /* ==========================================================================
           7. O'QUVCHILAR RO'YXATI
           ========================================================================== */
        .student-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .student-item {
            background-color: var(--bg-surface-light);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .student-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .student-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 15px;
            color: white;
            text-transform: uppercase;
        }

        .perm-controls {
            display: flex;
            gap: 8px;
        }

        .perm-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        /* O'qituvchi boshqarsa cursor pointer bo'ladi */
        .is-teacher .perm-btn { cursor: pointer; }
        .is-teacher .perm-btn:hover { border-color: var(--text-secondary); }
        
        .perm-btn.granted {
            background-color: var(--accent-blue-alpha);
            color: var(--accent-blue);
            border-color: rgba(59, 130, 246, 0.4);
        }

        /* ==========================================================================
           8. CHAT PANELI
           ========================================================================== */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            /* Scrollbar styling */
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }
        
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 10px; }

        .chat-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            word-wrap: break-word;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .chat-bubble.mine {
            background-color: var(--accent-blue);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-bubble.others {
            background-color: var(--bg-surface-light);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-sender {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .chat-bubble.mine .chat-sender { color: rgba(255,255,255,0.8); }

        .chat-time {
            font-size: 10px;
            opacity: 0.6;
            text-align: right;
            margin-top: 6px;
        }

        .chat-input-wrapper {
            padding: 16px;
            background-color: var(--bg-surface);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background-color: var(--bg-surface-light);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .chat-input:focus { border-color: var(--accent-blue); }

        .chat-send-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background-color: var(--accent-blue);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .chat-send-btn:hover { background-color: var(--accent-blue-hover); transform: scale(1.05); }

        /* ==========================================================================
           9. MATN KIRITISH MODALI (TEXT TOOL)
           ========================================================================== */
        .text-modal {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            width: 90%;
            max-width: 400px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            opacity: 0;
            pointer-events: none;
            transition: all var(--transition-normal);
            z-index: calc(var(--z-modal) + 2);
            box-shadow: var(--shadow-lg);
        }

        .text-modal.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .text-modal textarea {
            width: 100%;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            color: var(--text-primary);
            font-size: 16px;
            min-height: 100px;
            resize: none;
            margin: 16px 0;
        }
        .text-modal textarea:focus { border-color: var(--accent-blue); }

        /* ==========================================================================
           10. TOAST (XABARNOMALAR)
           ========================================================================== */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: var(--z-toast);
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background-color: var(--bg-surface-light);
            border-left: 4px solid var(--accent-blue);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-md);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDownToast 0.3s ease forwards;
            pointer-events: auto;
        }

        .toast.error { border-left-color: var(--danger); }
        .toast.success { border-left-color: var(--success); }

        @keyframes slideDownToast {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOutToast {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* ==========================================================================
           11. RESPONSIVE DIZAYN (MEDIA QUERIES)
           ========================================================================== */
        @media (max-width: 768px) {
            .sidebar { max-width: 100%; } /* Mobilda sidebar to'liq ekran */
            .status-bar { flex-direction: column; gap: 8px; }
            .toolbar-wrapper { padding: 0 8px; bottom: 16px; }
            .tool-btn { width: 40px; height: 40px; }
            .audio-monitor { display: none; } /* Mobilda joy tejash uchun audio to'lqinni yashiramiz */
            
            .auth-card { padding: 30px 20px; border-radius: 0; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; border: none; }
        }
        
        @media (max-width: 480px) {
            .grid-menu { grid-template-columns: 1fr; } /* Mobilda tugmalar ketma-ket */
        }

        /* WebRTC uchun yashirin audio elementlar konteyneri */
        #hidden-audio-container { display: none; }
    </style>
</head>
<body>

                <button class="tool-btn" id="btn-exit" title="Chiqish"><i data-lucide="log-out"></i></button>

        <h3 style="font-size: 18px; font-weight: 600;">Doskaga matn yozish</h3>

        <div style="display: flex; justify-content: flex-end; gap: 12px;">
            <button class="btn-main btn-secondary" id="btn-cancel-text" style="width: auto; padding: 10px 20px;">Bekor qilish</button>
            <button class="btn-main btn-primary" id="btn-add-text" style="width: auto; padding: 10px 20px; margin-bottom:0;">Qo'shish</button>
        </div>

    <script>
        /**
         * ============================================================================
         * MR BOARD CORE SYSTEM
         * Architecture: Object-Oriented, Event-Driven
         * Technologies: HTML5 Canvas, Firebase Realtime Database, WebRTC
         * ============================================================================
         */
        (function() {
            'use strict';

            // SVG Ikonkalarni yuklash
            lucide.createIcons();

            // ==========================================
            // 1. UTILITIES (Yordamchi Funksiyalar)
            // ==========================================
            const Utils = {
                /** Performans uchun tez-tez chaqiriluvchi funksiyalarni cheklash */
                throttle(func, limit) {
                    let inThrottle;
                    return function(...args) {
                        if (!inThrottle) {
                            func.apply(this, args);
                            inThrottle = true;
                            setTimeout(() => inThrottle = false, limit);
                        }
                    };
                },
                /** Noyob ID generatsiya qilish */
                generateId(prefix = 'id') {
                    return `${prefix}_${Math.random().toString(36).substr(2, 9)}_${Date.now()}`;
                },
                /** XSS hujumlaridan himoya qilish uchun matnni tozalash */
                escapeHTML(str) {
                    const div = document.createElement('div');
                    div.innerText = str;
                    return div.innerHTML;
                },
                /** Vaqtni formatlash (14:30) */
                formatTime(date = new Date()) {
                    return date.toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' });
                }
            };

            // ==========================================
            // 2. STATE MANAGEMENT (Ilova Holati)
            // ==========================================
            class Store {
                constructor() {
                    // Foydalanuvchi va Xona
                    this.userId = Utils.generateId('user');
                    this.userName = '';
                    this.isTeacher = false;
                    this.roomId = '';

                    // Ruxsatnomalar
                    this.canDraw = false;
                    this.canSpeak = false;

                    // Qurilma / Asboblar
                    this.isMicOn = false;
                    this.currentTool = 'draw'; // draw, erase, pan, text
                    this.currentColor = '#3b82f6';
                    this.penSize = 4;
                    
                    // Kamera (Transform)
                    this.camera = { x: 0, y: 0, zoom: 1.0 };
                    
                    // Ma'lumotlar
                    this.elements = []; // Chiziqlar, Rasmlar, Matnlar
                    this.activePaths = {}; // Ayni paytda chizilayotgan chiziqlar
                    this.cursors = {}; // Boshqa foydalanuvchilar kursorlari
                    this.students = {}; // Xonadagi barcha odamlar
                    
                    // Vaqtinchalik UI holati
                    this.textDropPosition = null;
                    this.unreadChats = 0;
                }

                get hasDrawPerm() { return this.isTeacher || this.canDraw; }
                get hasSpeakPerm() { return this.isTeacher || this.canSpeak; }
            }
            const state = new Store();

            // ==========================================
            // 3. UI BOSHQRUVI (DOM Manipulation)
            // ==========================================
            class UIManager {
                constructor() {
                    this.initElements();
                    this.bindEvents();
                }

                initElements() {
                    this.els = {
                        // Oynalar
                        welcomeScreen: document.getElementById('welcome-screen'),
                        appUI: document.getElementById('app-ui'),
                        overlay: document.getElementById('main-overlay'),
                        modalText: document.getElementById('modal-text'),
                        
                        // Yon menyular
                        sidebars: document.querySelectorAll('.sidebar'),
                        
                        // Inputs
                        usernameInp: document.getElementById('input-username'),
                        roomidInp: document.getElementById('input-roomid'),
                        chatInp: document.getElementById('input-chat'),
                        canvasTextInp: document.getElementById('input-canvas-text'),
                        
                        // Tugmalar (Welcome)
                        btnCreate: document.getElementById('btn-create-room'),
                        btnJoin: document.getElementById('btn-join-room'),
                        
                        // Toolbar tugmalar
                        btnMic: document.getElementById('btn-toggle-mic'),
                        btnUndo: document.getElementById('btn-undo'),
                        btnExit: document.getElementById('btn-exit'),
                        
                        // UI matnlar
                        uiRoomId: document.getElementById('ui-room-id'),
                        uiZoom: document.getElementById('ui-zoom-level'),
                        uiRole: document.getElementById('ui-role-badge'),
                        uiDbLevel: document.getElementById('ui-db-level')
                    };
                }

                bindEvents() {
                    // Auth
                    this.els.btnCreate.addEventListener('click', () => this.handleAuth(true));
                    this.els.btnJoin.addEventListener('click', () => this.handleAuth(false));

                    // Toolbar Sidebar Toggles
                    document.getElementById('btn-open-settings').onclick = () => this.openSidebar('sidebar-settings');
                    document.getElementById('btn-open-colors').onclick = () => this.openSidebar('sidebar-colors');
                    document.getElementById('btn-open-chat').onclick = () => this.openSidebar('sidebar-chat');
                    document.getElementById('btn-open-students').onclick = () => this.openSidebar('sidebar-students');

                    // Yopish tugmalari
                    document.querySelectorAll('[data-close]').forEach(btn => {
                        btn.onclick = () => this.closeAllSidebars();
                    });
                    this.els.overlay.onclick = () => this.closeAllSidebars();

                    // Asboblar
                    document.querySelectorAll('[data-tool]').forEach(btn => {
                        btn.onclick = () => {
                            this.setTool(btn.getAttribute('data-tool'));
                            this.closeAllSidebars();
                        };
                    });

                    // Qalinlik
                    const sizeSlider = document.getElementById('input-pen-size');
                    sizeSlider.oninput = (e) => {
                        state.penSize = parseInt(e.target.value);
                        document.getElementById('ui-pen-size-val').innerText = state.penSize;
                    };

                    // Menyudagi amallar
                    document.getElementById('menu-btn-undo').onclick = () => { dbService.undoMyLast(); this.closeAllSidebars(); };
                    document.getElementById('btn-undo').onclick = () => dbService.undoMyLast();
                    document.getElementById('menu-btn-center').onclick = () => {
                        state.camera = { x: 0, y: 0, zoom: 1 };
                        canvasEngine.requestRender();
                        this.updateZoomText();
                        dbService.syncCamera();
                        this.closeAllSidebars();
                    };
                    document.getElementById('menu-btn-clear').onclick = () => { dbService.clearBoard(); this.closeAllSidebars(); };
                    document.getElementById('menu-btn-image').onclick = () => { this.handleImageUpload(); this.closeAllSidebars(); };
                    document.getElementById('menu-btn-export').onclick = () => {
                        const link = document.createElement('a');
                        link.download = `MR_Board_${Date.now()}.png`;
                        link.href = document.getElementById('main-canvas').toDataURL('image/png');
                        link.click();
                        this.closeAllSidebars();
                    };

                    // Matn Modali
                    document.getElementById('btn-cancel-text').onclick = () => this.hideTextModal();
                    document.getElementById('btn-add-text').onclick = () => {
                        const text = this.els.canvasTextInp.value.trim();
                        if (text && state.textDropPosition) {
                            dbService.saveElement({
                                type: 'text',
                                text: text,
                                x: state.textDropPosition.x,
                                y: state.textDropPosition.y,
                                size: state.penSize * 3 + 12, // Qalinlikka mos shrift kattaligi
                                color: state.currentColor
                            });
                        }
                        this.hideTextModal();
                    };

                    // Chat
                    document.getElementById('btn-send-chat').onclick = () => this.sendChat();
                    this.els.chatInp.onkeypress = (e) => { if (e.key === 'Enter') this.sendChat(); };

                    // Mic
                    this.els.btnMic.onclick = () => audioManager.toggleMic();

                    // Exit
                    this.els.btnExit.onclick = () => {
                        if (confirm('Xonadan chiqmoqchimisiz?')) window.location.reload();
                    };
                }

                // ---- Auth Logic ----
                handleAuth(isCreating) {
                    const name = this.els.usernameInp.value.trim();
                    if (!name) { this.showToast("Iltimos ismingizni kiriting", "error"); return; }
                    
                    let roomId;
                    if (isCreating) {
                        roomId = 'MR-' + Math.floor(1000 + Math.random() * 9000);
                        state.isTeacher = true;
                    } else {
                        roomId = this.els.roomidInp.value.trim().toUpperCase();
                        if (!roomId) { this.showToast("Xona kodini kiriting", "error"); return; }
                        state.isTeacher = false;
                    }

                    state.userName = name;
                    this.startGame(roomId);
                }

                startGame(roomId) {
                    // Ekranni o'zgartirish
                    this.els.welcomeScreen.style.opacity = '0';
                    setTimeout(() => {
                        this.els.welcomeScreen.style.display = 'none';
                        this.els.appUI.style.display = 'block';
                        
                        this.els.uiRoomId.innerText = roomId;
                        
                        if (state.isTeacher) {
                            document.getElementById('btn-open-students').style.display = 'flex';
                            document.getElementById('teacher-controls-area').style.display = 'block';
                        }
                        
                        this.updateRoleBadge();

                        // Tizimlarni ishga tushirish
                        dbService.init(roomId);
                        if (!canvasEngine) canvasEngine = new CanvasEngine();
                        else canvasEngine.resize();
                        
                        if (!colorPicker) colorPicker = new ColorPicker();

                        audioManager.init();
                        this.showToast(`Xonaga kirdingiz: ${roomId}`, "success");

                    }, 300);
                }

                // ---- UI Updates ----
                openSidebar(id) {
                    this.closeAllSidebars();
                    this.els.overlay.classList.add('active');
                    document.getElementById(id).classList.add('active');
                    
                    if (id === 'sidebar-chat') {
                        state.unreadChats = 0;
                        document.getElementById('badge-chat').style.display = 'none';
                        this.els.chatInp.focus();
                    }
                }

                closeAllSidebars() {
                    this.els.sidebars.forEach(sb => sb.classList.remove('active'));
                    this.els.overlay.classList.remove('active');
                    this.hideTextModal();
                }

                setTool(tool) {
                    state.currentTool = tool;
                    document.querySelectorAll('[data-tool]').forEach(el => el.classList.remove('active'));
                    document.querySelector(`[data-tool="${tool}"]`).classList.add('active');
                    
                    const canvas = document.getElementById('main-canvas');
                    if (tool === 'pan') canvas.style.cursor = 'grab';
                    else if (tool === 'text') canvas.style.cursor = 'text';
                    else canvas.style.cursor = 'crosshair';
                }

                updateZoomText() {
                    this.els.uiZoom.innerText = Math.round(state.camera.zoom * 100) + '%';
                }

                updateRoleBadge() {
                    if (state.isTeacher) {
                        this.els.uiRole.innerHTML = '<i data-lucide="crown" size="14" style="color:var(--warning)"></i> O\'qituvchi';
                    } else if (state.canDraw) {
                        this.els.uiRole.innerHTML = '<i data-lucide="pencil" size="14" style="color:var(--accent-blue)"></i> Yozuvchi';
                    } else {
                        this.els.uiRole.innerHTML = '<i data-lucide="eye" size="14" style="color:var(--text-secondary)"></i> Kuzatuvchi';
                    }
                    lucide.createIcons();
                    this.updateMicBtnUI();
                }

                updateMicBtnUI() {
                    const btn = this.els.btnMic;
                    btn.classList.remove('mic-muted', 'mic-active', 'mic-speaking');
                    
                    if (!state.hasSpeakPerm) {
                        btn.classList.add('mic-muted');
                        btn.innerHTML = '<i data-lucide="mic-off"></i>';
                    } else if (state.isMicOn) {
                        btn.classList.add('mic-active');
                        btn.innerHTML = '<i data-lucide="mic"></i>';
                    } else {
                        btn.classList.add('mic-muted');
                        btn.innerHTML = '<i data-lucide="mic-off"></i>';
                    }
                    lucide.createIcons();
                }

                setMicPulse(isSpeaking) {
                    if (!state.hasSpeakPerm || !state.isMicOn) return;
                    if (isSpeaking) {
                        this.els.btnMic.classList.add('mic-speaking');
                        this.els.btnMic.classList.remove('mic-active');
                    } else {
                        this.els.btnMic.classList.remove('mic-speaking');
                        this.els.btnMic.classList.add('mic-active');
                    }
                }

                // ---- Modals & Uploads ----
                showTextModal() {
                    this.els.overlay.classList.add('active');
                    this.els.modalText.classList.add('active');
                    this.els.canvasTextInp.focus();
                }

                hideTextModal() {
                    this.els.modalText.classList.remove('active');
                    this.els.canvasTextInp.value = '';
                    state.textDropPosition = null;
                    if (!document.querySelector('.sidebar.active')) {
                        this.els.overlay.classList.remove('active');
                    }
                }

                handleImageUpload() {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    
                    input.onchange = (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        if (file.size > 5 * 1024 * 1024) {
                            this.showToast("Rasm hajmi 5MB dan kichik bo'lishi shart", "error");
                            return;
                        }

                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const img = new Image();
                            img.onload = () => {
                                // Ekranning markazini topish
                                const center = canvasEngine.screenToWorld(window.innerWidth / 2, window.innerHeight / 2);
                                
                                // O'lchamni optimallashtirish
                                const maxWidth = 500 / state.camera.zoom;
                                let w = img.width, h = img.height;
                                if (w > maxWidth) {
                                    h = (maxWidth / w) * h;
                                    w = maxWidth;
                                }

                                dbService.saveElement({
                                    type: 'image',
                                    data: ev.target.result,
                                    x: center.x - w / 2,
                                    y: center.y - h / 2,

            // ==========================================
            // 5. CANVAS ENGINE (Chizish Dvigateli)
            // ==========================================
            class CanvasEngine {
                constructor() {
                    this.canvas = document.getElementById('main-canvas');
                    this.ctx = this.canvas.getContext('2d', { alpha: false, desynchronized: true });
                    
                    this.isDrawing = false;
                    this.lastPoint = null;
                    this.activePathId = null;
                    this.needsRedraw = true;
                    
                    // Multi-touch va Zoom uchun state
                    this.initialPinchDistance = null;
                    this.initialZoom = 1;

                    this.resize();
                    window.addEventListener('resize', () => this.resize());
                    this.bindEvents();
                    
                    this.renderLoop = this.renderLoop.bind(this);
                    requestAnimationFrame(this.renderLoop);
                }

                resize() {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                    this.requestRender();
                }

                requestRender() { this.needsRedraw = true; }

                screenToWorld(x, y) {
                    return {
                        x: (x - state.camera.x) / state.camera.zoom,
                        y: (y - state.camera.y) / state.camera.zoom
                    };
                }

                worldToScreen(x, y) {
                    return {
                        x: x * state.camera.zoom + state.camera.x,
                        y: y * state.camera.zoom + state.camera.y
                    };
                }

                // ---- Event Handling (Touch & Mouse) ----
                bindEvents() {
                    // Siquv (Mouse/Trackpad)
                    this.canvas.addEventListener('wheel', this.handleWheel.bind(this), { passive: false });
                    
                    // Universal Pointer Events
                    this.canvas.addEventListener('pointerdown', this.handleDown.bind(this));
                    window.addEventListener('pointermove', this.handleMove.bind(this));
                    window.addEventListener('pointerup', this.handleUp.bind(this));
                    window.addEventListener('pointercancel', this.handleUp.bind(this));

                    // Multi-touch Pinch-to-zoom (Mobil)
                    this.canvas.addEventListener('touchstart', this.handleTouchStart.bind(this), { passive: false });
                    this.canvas.addEventListener('touchmove', this.handleTouchMove.bind(this), { passive: false });
                    this.canvas.addEventListener('touchend', this.handleTouchEnd.bind(this));
                }

                handleWheel(e) {
                    e.preventDefault();
                    const worldPos = this.screenToWorld(e.clientX, e.clientY);
                    const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
                    
                    let newZoom = Math.min(Math.max(0.1, state.camera.zoom * zoomFactor), 5.0);
                    
                    state.camera.zoom = newZoom;
                    state.camera.x = e.clientX - worldPos.x * state.camera.zoom;
                    state.camera.y = e.clientY - worldPos.y * state.camera.zoom;
                    
                    this.requestRender();
                    ui.updateZoomText();
                    dbService.syncCamera();
                }

                // Mobil pinch-to-zoom
                handleTouchStart(e) {
                    if (e.touches.length === 2) {
                        e.preventDefault();
                        this.isDrawing = false; // Chizishni to'xtatish
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        this.initialPinchDistance = Math.hypot(dx, dy);
                        this.initialZoom = state.camera.zoom;
                    } else if (e.touches.length === 1) {
                        // Bir barmoq bo'lsa standard pointer event ishlayveradi
                    }
                }

                handleTouchMove(e) {
                    if (e.touches.length === 2 && this.initialPinchDistance) {
                        e.preventDefault();
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        const currentDist = Math.hypot(dx, dy);
                        
                        // O'rtadagi nuqtaga qarab zoom qilish
                        const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        const worldPos = this.screenToWorld(centerX, centerY);

                        let newZoom = this.initialZoom * (currentDist / this.initialPinchDistance);
                        newZoom = Math.min(Math.max(0.1, newZoom), 5.0);

                        state.camera.zoom = newZoom;
                        state.camera.x = centerX - worldPos.x * state.camera.zoom;
                        state.camera.y = centerY - worldPos.y * state.camera.zoom;

                        this.requestRender();
                        ui.updateZoomText();
                        dbService.syncCamera();
                    }
                }

                handleTouchEnd(e) {
                    if (e.touches.length < 2) {
                        this.initialPinchDistance = null;
                    }
                }

                // Oddiy Pointer Logikasi
                handleDown(e) {
                    // Agar ikkinchi barmoq bosilsa yoki pointer type noto'g'ri bo'lsa o'tkazib yuboramiz
                    if (!e.isPrimary) return; 

                    const x = e.clientX, y = e.clientY;
                    const worldPos = this.screenToWorld(x, y);

                    // Text Tool
                    if (state.currentTool === 'text') {
                        if (state.hasDrawPerm) {
                            state.textDropPosition = worldPos;
                            ui.showTextModal();
                        } else {
                            ui.showToast("Sizda yozish huquqi yo'q", "error");
                        }
                        return;
                    }

                    this.isDrawing = true;
                    this.lastPoint = { x, y };

                    if (!state.hasDrawPerm && state.currentTool !== 'pan') {
                        this.isDrawing = false;
                        return;
                    }

                    if (state.currentTool === 'draw' || state.currentTool === 'erase') {
                        this.activePathId = state.userId + '_' + Date.now();
                        const color = state.currentTool === 'erase' ? '#09090b' : state.currentColor;
                        const size = (state.currentTool === 'erase' ? 40 : state.penSize) / state.camera.zoom;
                        
                        dbService.setActivePath(this.activePathId, {
                            userId: state.userId,
                            points: [worldPos],
                            color: color,
                            size: size
                        });
                    }
                }

                handleMove(e) {
                    if (!e.isPrimary) return;
                    const x = e.clientX, y = e.clientY;
                    const worldPos = this.screenToWorld(x, y);

                    // Faqat kerakli tezlikda kursor uzatamiz
                    dbService.syncCursor(worldPos);

                    if (!this.isDrawing) return;

                    // Pan (Surish)
                    if (state.currentTool === 'pan') {
                        state.camera.x += x - this.lastPoint.x;
                        state.camera.y += y - this.lastPoint.y;
                        this.lastPoint = { x, y };
                        this.requestRender();
                        return;
                    }

                    // Draw / Erase
                    if (state.hasDrawPerm && (state.currentTool === 'draw' || state.currentTool === 'erase')) {
                        const path = state.activePaths[this.activePathId];
                        if (path && path.points) {
                            const lastW = path.points[path.points.length - 1];
                            const dist = Math.hypot(worldPos.x - lastW.x, worldPos.y - lastW.y);
                            
                            // Nuqtalarni tejash (Performans)
                            if (dist > 3 / state.camera.zoom) {
                                path.points.push(worldPos);
                                dbService.updateActivePath(this.activePathId, path.points);
                            }
                        }
                    }
                    this.lastPoint = { x, y };
                }

                handleUp(e) {
                    if (!e.isPrimary || !this.isDrawing) return;
                    this.isDrawing = false;

                    if (state.hasDrawPerm && (state.currentTool === 'draw' || state.currentTool === 'erase')) {
                        const path = state.activePaths[this.activePathId];
                        if (path && path.points && path.points.length > 1) {
                            dbService.saveElement({
                                type: 'path',
                                points: path.points,
                                color: path.color,
                                size: path.size
                            });
                        }
                        if (this.activePathId) {
                            dbService.removeActivePath(this.activePathId);
                            this.activePathId = null;
                        }
                    }
                }

                // ---- Rendering ----
                
                // Silliqroq chizish uchun Quadratic Bezier ishlatamiz
                drawSmoothPath(points, color, size) {
                    if (!points || points.length < 2) return;
                    this.ctx.beginPath();
                    this.ctx.strokeStyle = color;
                    this.ctx.lineWidth = size;
                    this.ctx.lineCap = 'round';
                    this.ctx.lineJoin = 'round';
                    
                    this.ctx.moveTo(points[0].x, points[0].y);
                    
                    for (let i = 1; i < points.length - 1; i++) {
                        const xc = (points[i].x + points[i + 1].x) / 2;
                        const yc = (points[i].y + points[i + 1].y) / 2;
                        this.ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
                    }
                    // Oxirgi nuqta
                    this.ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
                    this.ctx.stroke();
                }

                drawGrid() {
                    this.ctx.strokeStyle = '#18181b'; // Juda qora fon uchun xira setka
                    this.ctx.lineWidth = 1;
                    const gs = 50 * state.camera.zoom;
                    if (gs < 15) return; // Uzoqlashganda setka chizilmaydi
                    
                    const ox = state.camera.x % gs;
                    const oy = state.camera.y % gs;
                    
                    this.ctx.beginPath();
                    for (let x = ox; x < this.canvas.width; x += gs) {
                        this.ctx.moveTo(x, 0); this.ctx.lineTo(x, this.canvas.height);
                    }
                    for (let y = oy; y < this.canvas.height; y += gs) {
                        this.ctx.moveTo(0, y); this.ctx.lineTo(this.canvas.width, y);
                    }
                    this.ctx.stroke();
                }

                renderLoop() {
                    if (this.needsRedraw) {
                        // Tozalash
                        this.ctx.setTransform(1, 0, 0, 1, 0, 0);
                        this.ctx.fillStyle = '#09090b';
                        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                        
                        this.drawGrid();
                        
                        // Kameraga o'tish
                        this.ctx.setTransform(state.camera.zoom, 0, 0, state.camera.zoom, state.camera.x, state.camera.y);
                        
                        // 1. Doimiy Elementlar
                        state.elements.forEach(el => {
                            if (el.type === 'path') {
                                this.drawSmoothPath(el.points, el.color, el.size);
                            } else if (el.type === 'text') {
                                this.ctx.font = `600 ${el.size}px -apple-system, sans-serif`;
                                this.ctx.fillStyle = el.color;
                                this.ctx.fillText(el.text, el.x, el.y);
                            } else if (el.type === 'image' && el.data) {
                                if (!el.imgObj) {
                                    el.imgObj = new Image();
                                    el.imgObj.src = el.data;
                                    el.imgObj.onload = () => this.requestRender();
                                }
                                if (el.imgObj.complete) {
                                    this.ctx.drawImage(el.imgObj, el.x, el.y, el.width, el.height);
                                }
                            }
                        });
                        
                        // 2. Jonli Chiziqlar
                        Object.values(state.activePaths).forEach(p => {
                            if (p && p.points) this.drawSmoothPath(p.points, p.color, p.size);
                        });
                        
                        // 3. Kursorlar (Ekranda chizish yaxshi, zoomga bo'ysunmaydi)
                        this.ctx.setTransform(1, 0, 0, 1, 0, 0);
                        Object.values(state.cursors).forEach(c => {
                            if (c.name === state.userName || typeof c.x !== 'number') return;
                            const sp = this.worldToScreen(c.x, c.y);
                            
                            this.ctx.beginPath();
                            this.ctx.arc(sp.x, sp.y, 5, 0, Math.PI * 2);
                            this.ctx.fillStyle = c.isTeacher ? '#f59e0b' : '#ef4444';
                            this.ctx.fill();
                            this.ctx.lineWidth = 2;
                            this.ctx.strokeStyle = '#ffffff';
                            this.ctx.stroke();

                            this.ctx.font = '12px sans-serif';
                            this.ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                            this.ctx.fillText(c.name, sp.x + 10, sp.y + 4);
                        });

                        this.needsRedraw = false;
                    }
                    requestAnimationFrame(this.renderLoop);
                }
            }
            let canvasEngine;

            // ==========================================
            // 6. AUDIO ENGINE (WebRTC & 1:1 Sifat)
            // ==========================================
            class AudioManager {
                constructor() {
                    this.stream = null;
                    this.peers = {};
                    this.audioCtx = null;
                    this.analyser = null;
                    this.dataArr = null;
                    this.isSpeaking = false;
                    this.speakTimer = null;
                    
                    // WebRTC ICE Serverlar
                    this.rtcConfig = {
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:stun1.l.google.com:19302' }
                        ]
                    };
                }

                async init() {
                    try {
                        // MUHIM: 1:1 Ovoz sifati uchun agressiv filtarlarni o'chirish
                        // EchoCancellation - Karnay va mikrafon birga ishlaganda aks sado bermaslik uchun yoniq bo'lishi shart!
                        // Qolgan "sun'iy tozalash"lar o'chiriladi.
                        this.stream = await navigator.mediaDevices.getUserMedia({ 
                            audio: {
                                echoCancellation: true,  
                                noiseSuppression: false, 
                                autoGainControl: false,  
                                sampleRate: 48000,
                                channelCount: 1
                            } 
                        });
                        
                        this.updateMicPhysical();
                        this.setupVisualizer();
                        this.listenSignals();
                        console.log("[Audio] Muvaffaqiyatli ishga tushdi");
                    } catch (e) {
                        console.error("[Audio Error]", e);
                        ui.showToast("Mikrofonga ruxsat bermadingiz", "error");
                    }
                }

                toggleMic() {
                    if (!state.hasSpeakPerm) {
                        ui.showToast("Sizda mikrofon huquqi yo'q", "error");
                        return;
                    }
                    state.isMicOn = !state.isMicOn;
                    this.updateMicPhysical();
                    ui.updateMicBtnUI();
                }

                updateMicPhysical() {
                    if (this.stream) {
                        const track = this.stream.getAudioTracks()[0];
                        if (track) {
                            track.enabled = state.hasSpeakPerm && state.isMicOn;
                        }
                    }
                }

                // ---- Vizualizator ----
                setupVisualizer() {
                    const Ctx = window.AudioContext || window.webkitAudioContext;
                    this.audioCtx = new Ctx();
                    this.analyser = this.audioCtx.createAnalyser();
                    
                    const source = this.audioCtx.createMediaStreamSource(this.stream);
                    source.connect(this.analyser);
                    
                    this.analyser.fftSize = 256;
                    this.dataArr = new Uint8Array(this.analyser.frequencyBinCount);
                    
                    this.animateWave();
                }

                animateWave = () => {
                    requestAnimationFrame(this.animateWave);
                    
                    const bars = document.querySelectorAll('.audio-bar');
                    const text = ui.els.uiDbLevel;
                    
                    if (!(state.hasSpeakPerm && state.isMicOn)) {
                        bars.forEach(b => b.style.height = '4px');
                        if (text) text.innerText = 'Muted';
                        return;
                    }

                    this.analyser.getByteFrequencyData(this.dataArr);
                    let sum = 0;
                    for (let i = 0; i < this.dataArr.length; i++) sum += this.dataArr[i];
                    let avg = sum / this.dataArr.length;
                    
                    // DB hisoblash
                    let db = Math.round(20 * Math.log10(avg / 255 + 0.1));
                    db = Math.max(-60, Math.min(0, db));
                    if (text) text.innerText = avg < 5 ? '-∞ dB' : `${db} dB`;

                    // Yashil yozish effekti
                    const isSpeaking = avg > 20;
                    if (isSpeaking !== this.isSpeaking) {
                        this.isSpeaking = isSpeaking;
                        clearTimeout(this.speakTimer);
                        
                        if (isSpeaking) {
                            ui.setMicPulse(true);
                        } else {
                            this.speakTimer = setTimeout(() => {
                                if (!this.isSpeaking) ui.setMicPulse(false);
                            }, 300);
                        }
                    }

                    // Chiziqlarni o'ynatish
                    const norm = Math.min(1, avg / 120);
                    bars.forEach((bar, i) => {
                        const factor = Math.sin((i / bars.length) * Math.PI);
                        let h = 4 + (norm * 24 * factor);
                        bar.style.height = `${Math.max(4, Math.min(24, h))}px`;
                    });
                }

                // ---- Signaling (WebRTC) ----
                listenSignals() {
                    const sigRef = dbService.ref.child('signals/' + state.userId);
                    sigRef.on('child_added', async (snap) => {
                        const data = snap.val();
                        snap.ref.remove(); 
                        
                        try {
                            if (data.type === 'offer') await this.handleOffer(data.from, data.sdp);
                            else if (data.type === 'answer') await this.handleAnswer(data.from, data.sdp);
                            else if (data.type === 'ice') await this.handleIce(data.from, data.ice);
                        } catch (e) { console.error("[RTC Error]", e); }
                    });

                    // Yangi odam kirsa qo'ng'iroq qilish
                    dbService.ref.child('students').on('child_added', snap => {
                        const uid = snap.key;
                        if (uid !== state.userId) setTimeout(() => this.callUser(uid), 1500);
                    });
                }

                createPeer(peerId) {
                    const pc = new RTCPeerConnection(this.rtcConfig);
                    
                    if (this.stream) {
                        this.stream.getTracks().forEach(t => pc.addTrack(t, this.stream));
                    }
                    
                    pc.onicecandidate = (e) => {
                        if (e.candidate) this.sendSignal(peerId, { type: 'ice', ice: JSON.stringify(e.candidate) });
                    };
                    
                    pc.ontrack = (e) => {
                        const audioId = 'audio_' + peerId;
                        let audioEl = document.getElementById(audioId);
                        
                        if (!audioEl) {
                            audioEl = document.createElement('audio');
                            audioEl.id = audioId;
                            audioEl.autoplay = true;
                            document.getElementById('hidden-audio-container').appendChild(audioEl);
                        }
                        
                        // Faqat yangi stream bo'lsa ulash (Uzilishlarni oldini oladi)
                        if (audioEl.srcObject !== e.streams[0]) {
                            audioEl.srcObject = e.streams[0];
                            audioEl.play().catch(() => {
                                document.body.addEventListener('click', () => audioEl.play(), { once: true });
                            });
                        }
                    };

                    this.peers[peerId] = pc;
                    return pc;
                }

                async callUser(uid) {
                    if (this.peers[uid]) return; 
                    const pc = this.createPeer(uid);
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    this.sendSignal(uid, { type: 'offer', sdp: JSON.stringify(offer) });
                }

                async handleOffer(uid, sdpStr) {
                    const pc = this.createPeer(uid);
                    await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(sdpStr)));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    this.sendSignal(uid, { type: 'answer', sdp: JSON.stringify(answer) });
                }

                async handleAnswer(uid, sdpStr) {
                    const pc = this.peers[uid];
                    if (pc) await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(sdpStr)));
                }

                async handleIce(uid, iceStr) {
                    const pc = this.peers[uid];
                    if (pc) await pc.addIceCandidate(new RTCIceCandidate(JSON.parse(iceStr)));
                }

                sendSignal(to, data) {
                    dbService.ref.child('signals/' + to).push({ from: state.userId, ...data });
                }
            }
            const audioManager = new AudioManager();

            // ==========================================
            // 7. COLOR PICKER (Rang Tanlagich)
            // ==========================================
            class ColorPicker {
                constructor() {
                    this.canvas = document.getElementById('colorWheel');
                    this.ctx = this.canvas.getContext('2d');
                    this.hue = 0.6; // Boshlang'ich (Blue)
                    this.sat = 0.8;
                    this.val = 1.0;
                    
                    this.initEvents();
                    this.drawWheel();
                    this.setupQuickColors();
                }

                initEvents() {
                    // Wheel interactions
                    const interact = (e) => {
                        const rect = this.canvas.getBoundingClientRect();
                        const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                        const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                        
                        const cx = this.canvas.width / 2;
                        const cy = this.canvas.height / 2;
                        const r = this.canvas.width / 2;
                        
                        const dx = x - cx, dy = y - cy;
                        const dist = Math.hypot(dx, dy);
                        
                        if (dist <= r) {
                            let angle = Math.atan2(dy, dx);
                            this.hue = (angle + Math.PI) / (2 * Math.PI);
                            this.sat = dist / r;
                            this.updateColor();
                        }
                    };

                    this.canvas.addEventListener('pointerdown', interact);
                    this.canvas.addEventListener('pointermove', (e) => { if (e.buttons > 0) interact(e); });

                    // Brightness slider
                    document.getElementById('input-brightness').oninput = (e) => {
                        this.val = parseInt(e.target.value) / 100;
                        this.updateColor();
                    };
                }

                drawWheel() {
                    const w = this.canvas.width, h = this.canvas.height;
                    const cx = w / 2, cy = h / 2, r = w / 2;
                    const img = this.ctx.createImageData(w, h);
                    const d = img.data;

                    for (let y = 0; y < h; y++) {
                        for (let x = 0; x < w; x++) {
                            const dx = x - cx, dy = y - cy;
                            const dist = Math.hypot(dx, dy);
                            if (dist <= r) {
                                let angle = Math.atan2(dy, dx);
                                let hue = (angle + Math.PI) / (2 * Math.PI);
                                let sat = dist / r;
                                
                                const rgb = this.hsv2rgb(hue, sat, 1);
                                const i = (y * w + x) * 4;
                                d[i] = rgb.r; d[i+1] = rgb.g; d[i+2] = rgb.b; d[i+3] = 255;
                            }
                        }
                    }
                    this.ctx.putImageData(img, 0, 0);
                }

                updateColor() {
                    const rgb = this.hsv2rgb(this.hue, this.sat, this.val);
                    const hex = this.rgb2hex(rgb.r, rgb.g, rgb.b);
                    state.currentColor = hex;
                    
                    document.getElementById('ui-color-preview').style.backgroundColor = hex;
                    document.getElementById('ui-current-color').style.backgroundColor = hex;
                    ui.setTool('draw'); // Avtomatik qalamga o'tish
                }

                setupQuickColors() {
                    const colors = ['#ffffff', '#a1a1aa', '#ef4444', '#f97316', '#f59e0b', '#84cc16', '#10b981', '#06b6d4', '#3b82f6', '#8b5cf6', '#d946ef', '#f43f5e'];
                    const container = document.getElementById('quick-colors-container');
                    
                    colors.forEach(c => {
                        const btn = document.createElement('div');
                        btn.className = 'quick-color-btn';
                        btn.style.backgroundColor = c;
                        btn.onclick = () => {
                            state.currentColor = c;
                            document.getElementById('ui-color-preview').style.backgroundColor = c;
                            document.getElementById('ui-current-color').style.backgroundColor = c;
                            ui.setTool('draw');
                        };
                        container.appendChild(btn);
                    });
                }

                hsv2rgb(h, s, v) {
                    let r, g, b;
                    let i = Math.floor(h * 6), f = h * 6 - i, p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
                    switch (i % 6) {
                        case 0: r=v; g=t; b=p; break; case 1: r=q; g=v; b=p; break; case 2: r=p; g=v; b=t; break;
                        case 3: r=p; g=q; b=v; break; case 4: r=t; g=p; b=v; break; case 5: r=v; g=p; b=q; break;
                    }
                    return { r: Math.round(r*255), g: Math.round(g*255), b: Math.round(b*255) };
                }

                rgb2hex(r, g, b) {
                    return "#" + ((1<<24) + (r<<16) + (g<<8) + b).toString(16).slice(1);
                }
            }
            let colorPicker;

        })();
