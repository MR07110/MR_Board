                    });
                }
            }
            const FirebaseEngine = new FirebaseManager();

            // ==========================================
            // 5. CANVAS RENDERER (Optimized Graphics)
            // ==========================================
            class Renderer {
                constructor() {
                    this.cvs = document.getElementById('main-canvas');
                    this.ctx = this.cvs.getContext('2d', { alpha: false, desynchronized: true });
                    
                    this.isDrawing = false;
                    this.lastPt = null;
                    this.activeId = null;
                    this.dirty = true;
                    
                    this.pinchDist = null;
                    this.pinchZoom = 1;
                }

                init() {
                    this.resize();
                    window.addEventListener('resize', () => this.resize());
                    this.attachIO();
                    requestAnimationFrame(() => this.loop());
                }

                resize() { this.cvs.width = window.innerWidth; this.cvs.height = window.innerHeight; this.requestRedraw(); }
                requestRedraw() { this.dirty = true; }

                toWorld(x, y) { return { x: (x - AppState.camera.x) / AppState.camera.zoom, y: (y - AppState.camera.y) / AppState.camera.zoom }; }
                toScreen(x, y) { return { x: x * AppState.camera.zoom + AppState.camera.x, y: y * AppState.camera.zoom + AppState.camera.y }; }

                attachIO() {
                    this.cvs.addEventListener('wheel', e => {
                        e.preventDefault();
                        const wPos = this.toWorld(e.clientX, e.clientY);
                        const factor = e.deltaY > 0 ? 0.9 : 1.1;
                        let nz = Math.min(Math.max(0.1, AppState.camera.zoom * factor), 5.0);
                        
                        AppState.camera.zoom = nz;
                        AppState.camera.x = e.clientX - wPos.x * nz;
                        AppState.camera.y = e.clientY - wPos.y * nz;
                        
                        this.requestRedraw(); UI.updateZoom(); FirebaseEngine.syncCamera();
                    }, { passive: false });

                    this.cvs.addEventListener('pointerdown', e => {
                        if (!e.isPrimary) return;
                        const wPos = this.toWorld(e.clientX, e.clientY);

                        if (AppState.tool === 'text') {
                            if (AppState.canDraw) { AppState.textPos = wPos; UI.showTextDialog(); }
                            else UI.toast("Ruxsat yo'q", "error");
                            return;
                        }

                        this.isDrawing = true; this.lastPt = { x: e.clientX, y: e.clientY };

                        if (!AppState.canDraw && AppState.tool !== 'pan') { this.isDrawing = false; return; }

                        if (AppState.tool === 'draw' || AppState.tool === 'erase') {
                            this.activeId = AppState.uid + '_' + Date.now();
                            const c = AppState.tool === 'erase' ? '#000000' : AppState.color;
                            const s = (AppState.tool === 'erase' ? 50 : AppState.size) / AppState.camera.zoom;
                            FirebaseEngine.setLivePath(this.activeId, { uid: AppState.uid, points: [wPos], color: c, size: s });
                        }
                    });

                    window.addEventListener('pointermove', e => {
                        if (!e.isPrimary) return;
                        const wPos = this.toWorld(e.clientX, e.clientY);
                        FirebaseEngine.syncCursor(wPos);

                        if (!this.isDrawing) return;

                        if (AppState.tool === 'pan') {
                            AppState.camera.x += e.clientX - this.lastPt.x;
                            AppState.camera.y += e.clientY - this.lastPt.y;
                            this.lastPt = { x: e.clientX, y: e.clientY };
                            this.requestRedraw(); return;
                        }

                        if (AppState.canDraw && (AppState.tool === 'draw' || AppState.tool === 'erase')) {
                            const path = AppState.livePaths[this.activeId];
                            if (path && path.points) {
                                const lW = path.points[path.points.length - 1];
                                if (Math.hypot(wPos.x - lW.x, wPos.y - lW.y) > 3 / AppState.camera.zoom) {
                                    path.points.push(wPos);
                                    FirebaseEngine.updateLivePath(this.activeId, path.points);
                                }
                            }
                        }
                        this.lastPt = { x: e.clientX, y: e.clientY };
                    });

                    window.addEventListener('pointerup', e => {
                        if (!e.isPrimary || !this.isDrawing) return;
                        this.isDrawing = false;
                        
                        if (AppState.canDraw && (AppState.tool === 'draw' || AppState.tool === 'erase') && this.activeId) {
                            const path = AppState.livePaths[this.activeId];
                            if (path && path.points && path.points.length > 1) {
                                FirebaseEngine.pushElement({ type: 'path', points: path.points, color: path.color, size: path.size });
                            }
                            FirebaseEngine.delLivePath(this.activeId);
                            this.activeId = null;
                        }
                    });

                    // Mobile Pinch-to-zoom
                    this.cvs.addEventListener('touchstart', e => {
                        if(e.touches.length === 2) {
                            e.preventDefault(); this.isDrawing = false;
                            this.pinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                            this.pinchZoom = AppState.camera.zoom;
                        }
                    }, {passive:false});
                    this.cvs.addEventListener('touchmove', e => {
                        if(e.touches.length === 2 && this.pinchDist) {
                            e.preventDefault();
                            const cd = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                            const cx = (e.touches[0].clientX + e.touches[1].clientX)/2, cy = (e.touches[0].clientY + e.touches[1].clientY)/2;
                            const wPos = this.toWorld(cx, cy);
                            
                            let nz = Math.min(Math.max(0.1, this.pinchZoom * (cd / this.pinchDist)), 5.0);
                            AppState.camera.zoom = nz;
                            AppState.camera.x = cx - wPos.x * nz;
                            AppState.camera.y = cy - wPos.y * nz;
                            this.requestRedraw(); UI.updateZoom(); FirebaseEngine.syncCamera();
                        }
                    }, {passive:false});
                    this.cvs.addEventListener('touchend', e => { if(e.touches.length < 2) this.pinchDist = null; });
                }

                drawSpline(pts, c, s) {
                    if (!pts || pts.length < 2) return;
                    this.ctx.beginPath(); this.ctx.strokeStyle = c; this.ctx.lineWidth = s;
                    this.ctx.lineCap = 'round'; this.ctx.lineJoin = 'round';
                    this.ctx.moveTo(pts[0].x, pts[0].y);
                    for (let i = 1; i < pts.length - 1; i++) {
                        const xc = (pts[i].x + pts[i+1].x) / 2, yc = (pts[i].y + pts[i+1].y) / 2;
                        this.ctx.quadraticCurveTo(pts[i].x, pts[i].y, xc, yc);
                    }
                    this.ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
                    this.ctx.stroke();
                }

                drawBg() {
                    this.ctx.strokeStyle = '#1a1a1a'; this.ctx.lineWidth = 1;
                    const gs = 60 * AppState.camera.zoom;
                    if (gs < 20) return;
                    
                    const ox = AppState.camera.x % gs, oy = AppState.camera.y % gs;
                    this.ctx.beginPath();
                    for (let x = ox; x < this.cvs.width; x += gs) { this.ctx.moveTo(x, 0); this.ctx.lineTo(x, this.cvs.height); }
                    for (let y = oy; y < this.cvs.height; y += gs) { this.ctx.moveTo(0, y); this.ctx.lineTo(this.cvs.width, y); }
                    this.ctx.stroke();
                }

                loop() {
                    if (this.dirty) {
                        this.ctx.setTransform(1, 0, 0, 1, 0, 0);
                        this.ctx.fillStyle = '#000000';
                        this.ctx.fillRect(0, 0, this.cvs.width, this.cvs.height);
                        this.drawBg();
                        
                        this.ctx.setTransform(AppState.camera.zoom, 0, 0, AppState.camera.zoom, AppState.camera.x, AppState.camera.y);
                        
                        AppState.elements.forEach(el => {
                            if (el.type === 'path') this.drawSpline(el.points, el.color, el.size);
                            else if (el.type === 'text') {
                                this.ctx.font = `600 ${el.size}px Inter, sans-serif`;
                                this.ctx.fillStyle = el.color; this.ctx.fillText(el.text, el.x, el.y);
                            } else if (el.type === 'image' && el.data) {
                                if (!el._img) { el._img = new Image(); el._img.src = el.data; el._img.onload = () => this.requestRedraw(); }
                                if (el._img.complete) this.ctx.drawImage(el._img, el.x, el.y, el.width, el.height);
                            }
                        });
                        
                        Object.values(AppState.livePaths).forEach(p => { if (p && p.points) this.drawSpline(p.points, p.color, p.size); });
                        
                        this.ctx.setTransform(1, 0, 0, 1, 0, 0);
                        Object.values(AppState.cursors).forEach(c => {
                            if (c.name === AppState.uname || typeof c.x !== 'number') return;
                            const sp = this.toScreen(c.x, c.y);
                            
                            this.ctx.beginPath(); this.ctx.arc(sp.x, sp.y, 6, 0, Math.PI * 2);
                            this.ctx.fillStyle = c.isHost ? '#f59e0b' : '#ef4444'; this.ctx.fill();
                            this.ctx.lineWidth = 2; this.ctx.strokeStyle = '#fff'; this.ctx.stroke();

                            this.ctx.font = '600 12px Inter, sans-serif'; this.ctx.fillStyle = '#fff';
                            this.ctx.fillText(c.name, sp.x + 12, sp.y + 5);
                        });
                        this.dirty = false;
                    }
                    requestAnimationFrame(() => this.loop());
                }
            }
            const CanvasEngine = new Renderer();

            // ==========================================
            // 6. WEBRTC AUDIO MESH NETWORK
            // ==========================================
            class VoiceNetwork {
                constructor() {
                    this.stream = null; this.rtcPeers = {}; this.aCtx = null; this.analyser = null; this.data = null;
                    this.cfg = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };
                }

                async init() {
                    try {
                        this.stream = await navigator.mediaDevices.getUserMedia({
                            audio: { echoCancellation: true, noiseSuppression: false, autoGainControl: false }
                        });
                        this.applyMicState();
                        this.setupViz();
                        this.startSignaling();
                    } catch (e) { console.error("Mic Err:", e); UI.toast("Mikrofon ulashda xatolik", "error"); }
                }

                toggle() {
                    if (!AppState.canSpeak) return UI.toast("Huquq yo'q", "error");
                    AppState.micActive = !AppState.micActive;
                    this.applyMicState(); UI.syncMicUI();
                }

                applyMicState() {
                    if (this.stream) {
                        const t = this.stream.getAudioTracks()[0];
                        if (t) t.enabled = AppState.canSpeak && AppState.micActive;
                    }
                }

                setupViz() {
                    this.aCtx = new (window.AudioContext || window.webkitAudioContext)();
                    this.analyser = this.aCtx.createAnalyser();
                    this.aCtx.createMediaStreamSource(this.stream).connect(this.analyser);
                    this.analyser.fftSize = 256;
                    this.data = new Uint8Array(this.analyser.frequencyBinCount);
                    this.drawViz();
                }

                drawViz = () => {
                    requestAnimationFrame(this.drawViz);
                    const bars = document.querySelectorAll('.w-bar'), txt = document.getElementById('audio-db');
                    if (!(AppState.canSpeak && AppState.micActive)) {
                        bars.forEach(b => b.style.height = '4px'); if(txt) txt.innerText = 'OFF';
                        UI.pulseMic(false); return;
                    }
                    
                    this.analyser.getByteFrequencyData(this.data);
                    let sum = 0; for(let i=0; i<this.data.length; i++) sum += this.data[i];
                    let avg = sum / this.data.length;
                    
                    let db = Math.round(20 * Math.log10(avg/255 + 0.1));
                    db = Math.max(-60, Math.min(0, db));
                    if(txt) txt.innerText = avg < 5 ? '-∞ dB' : `${db} dB`;
                    
                    UI.pulseMic(avg > 15);
                    
                    const norm = Math.min(1, avg / 120);
                    bars.forEach((b, i) => {
                        const f = Math.sin((i/bars.length) * Math.PI);
                        b.style.height = `${Math.max(4, 4 + (norm * 20 * f))}px`;
                    });
                }

                startSignaling() {
                    const sig = FirebaseEngine.ref.child(`signals/${AppState.uid}`);
                    sig.on('child_added', async s => {
                        const d = s.val(); s.ref.remove();
                        try {
                            if (d.type === 'offer') await this.handleOffer(d.from, d.sdp);
                            else if (d.type === 'answer') await this.handleAnswer(d.from, d.sdp);
                            else if (d.type === 'ice') await this.handleIce(d.from, d.ice);
                        } catch (e) {}
                    });

                    // Mesh Logic: Qachonki yangi a'zo kirsa, ulanamiz
                    FirebaseEngine.ref.child('users').on('child_added', s => {
                        const uid = s.key;
                        if (uid !== AppState.uid) setTimeout(() => this.call(uid), 2000);
                    });
                    
                    // Chiqib ketsa, peer ni o'chiramiz
                    FirebaseEngine.ref.child('users').on('child_removed', s => {
                        const uid = s.key;
                        if(this.rtcPeers[uid]) { this.rtcPeers[uid].close(); delete this.rtcPeers[uid]; }
                        const a = document.getElementById(`audio_${uid}`);
                        if(a) a.remove();
                    });
                }

                createPC(uid) {
                    const pc = new RTCPeerConnection(this.cfg);
                    if (this.stream) this.stream.getTracks().forEach(t => pc.addTrack(t, this.stream));
                    
                    pc.onicecandidate = e => { if (e.candidate) FirebaseEngine.ref.child(`signals/${uid}`).push({ from: AppState.uid, type: 'ice', ice: JSON.stringify(e.candidate) }); };
                    pc.ontrack = e => {
                        let a = document.getElementById(`audio_${uid}`);
                        if (!a) { a = document.createElement('audio'); a.id = `audio_${uid}`; a.autoplay = true; document.getElementById('rtc-audio-pool').appendChild(a); }
                        if (a.srcObject !== e.streams[0]) {
                            a.srcObject = e.streams[0];
                            a.play().catch(() => document.body.addEventListener('click', () => a.play(), {once:true}));
                        }
                    };
                    this.rtcPeers[uid] = pc;
                    return pc;
                }

                async call(uid) {
                    if (this.rtcPeers[uid]) return;
                    const pc = this.createPC(uid);
                    const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
                    FirebaseEngine.ref.child(`signals/${uid}`).push({ from: AppState.uid, type: 'offer', sdp: JSON.stringify(offer) });
                }

                async handleOffer(uid, sdp) {
                    const pc = this.createPC(uid);
                    await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(sdp)));
                    const answer = await pc.createAnswer(); await pc.setLocalDescription(answer);
                    FirebaseEngine.ref.child(`signals/${uid}`).push({ from: AppState.uid, type: 'answer', sdp: JSON.stringify(answer) });
                }

                async handleAnswer(uid, sdp) { if (this.rtcPeers[uid]) await this.rtcPeers[uid].setRemoteDescription(new RTCSessionDescription(JSON.parse(sdp))); }
                async handleIce(uid, ice) { if (this.rtcPeers[uid]) await this.rtcPeers[uid].addIceCandidate(new RTCIceCandidate(JSON.parse(ice))); }
            }
            const AudioEngine = new VoiceNetwork();

            // ==========================================
            // 7. COLOR ENGINE (Custom Color Wheel)
            // ==========================================
            class ColorManager {
                constructor() {
                    this.cvs = document.getElementById('color-canvas');
                    this.ctx = this.cvs.getContext('2d');
                    this.h = 0.6; this.s = 0.8; this.v = 1.0;
                }

                init() {
                    this.draw(); this.buildPalette();
                    const move = e => {
                        if (e.buttons === 0 && e.type !== 'pointerdown') return;
                        const r = this.cvs.getBoundingClientRect();
                        const x = (e.clientX || (e.touches && e.touches[0].clientX)) - r.left;
                        const y = (e.clientY || (e.touches && e.touches[0].clientY)) - r.top;
                        const cx = this.cvs.width/2, cy = this.cvs.height/2, rad = this.cvs.width/2;
                        
                        const dist = Math.hypot(x-cx, y-cy);
                        if (dist <= rad) {
                            this.h = (Math.atan2(y-cy, x-cx) + Math.PI) / (2 * Math.PI);
                            this.s = dist / rad;
                            this.apply();
                        }
                    };
                    this.cvs.addEventListener('pointerdown', move);
                    this.cvs.addEventListener('pointermove', move);
                    document.getElementById('inp-bright').oninput = e => { this.v = parseInt(e.target.value)/100; this.apply(); };
                }

                draw() {
                    const w = this.cvs.width, h = this.cvs.height, cx = w/2, cy = h/2, r = w/2;
                    const img = this.ctx.createImageData(w, h), d = img.data;
                    for (let y = 0; y < h; y++) {
                        for (let x = 0; x < w; x++) {
                            const dist = Math.hypot(x-cx, y-cy);
                            if (dist <= r) {
                                const rgb = this.hsv2rgb((Math.atan2(y-cy, x-cx) + Math.PI) / (2 * Math.PI), dist/r, 1);
                                const i = (y*w+x)*4; d[i]=rgb.r; d[i+1]=rgb.g; d[i+2]=rgb.b; d[i+3]=255;
                            }
                        }
                    }
                    this.ctx.putImageData(img, 0, 0);
                }

                apply() {
                    const rgb = this.hsv2rgb(this.h, this.s, this.v);
                    const hex = "#" + ((1<<24)+(rgb.r<<16)+(rgb.g<<8)+rgb.b).toString(16).slice(1);
                    AppState.color = hex;
                    document.getElementById('ui-color-preview').style.backgroundColor = hex;
                    document.getElementById('ui-color-dot').style.backgroundColor = hex;
                    UI.setTool('draw');
                }

                buildPalette() {
                    const p = document.getElementById('color-palette');
                    ['#ffffff', '#a1a1aa', '#ef4444', '#f97316', '#f59e0b', '#84cc16', '#10b981', '#06b6d4', '#3b82f6', '#8b5cf6'].forEach(c => {
                        const b = document.createElement('div'); b.className = 'palette-color'; b.style.backgroundColor = c;
                        b.onclick = () => { AppState.color = c; document.getElementById('ui-color-preview').style.backgroundColor = c; document.getElementById('ui-color-dot').style.backgroundColor = c; UI.setTool('draw'); };
                        p.appendChild(b);
                    });
                }

                hsv2rgb(h, s, v) {
                    let r, g, b, i = Math.floor(h*6), f = h*6-i, p = v*(1-s), q = v*(1-f*s), t = v*(1-(1-f)*s);
                    switch(i%6) { case 0: r=v; g=t; b=p; break; case 1: r=q; g=v; b=p; break; case 2: r=p; g=v; b=t; break; case 3: r=p; g=q; b=v; break; case 4: r=t; g=p; b=v; break; case 5: r=v; g=p; b=q; break; }
                    return { r: Math.round(r*255), g: Math.round(g*255), b: Math.round(b*255) };
                }
            }
            const ColorEngine = new ColorManager();

        })();
    </script>
